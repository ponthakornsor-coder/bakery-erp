function erpPad(n){ return String(n).padStart(2,'0'); }
function excelSerialToDate(v){
  const n=Number(v);
  if(!isFinite(n)) return null;
  // Google/Excel serial date: day 1 = 1899-12-31 with Excel leap-year offset handled by base 1899-12-30
  // If value is too large and looks like date+time serial, still works.
  return new Date(Math.round((n - 25569) * 86400 * 1000));
}

const SAFE_TO_RETRY_ACTIONS_=['all','sheet'];
async function apiGet(action='all', params={}, _retriesLeft){
  // v9.38 fix: การโหลดข้อมูล (action=all/sheet) เป็น read-only ไม่มีผลข้างเคียง ลองใหม่อัตโนมัติได้อย่าง
  // ปลอดภัยถ้าเชื่อมต่อไม่ติด (ไม่ต้องให้คนกด Refresh เองซ้ำๆ) ส่วน action ที่เป็นการเขียนข้อมูล
  // (fastwrite/write) ไม่ลองซ้ำอัตโนมัติ เพราะถ้ารอบแรกสำเร็จฝั่ง Server แล้วแค่ client ไม่ทันรู้ผล
  // การยิงซ้ำอาจกลายเป็นสร้างข้อมูลซ้ำ (บั๊กคลาสเดียวกับที่เจอเรื่อง movement ซ้ำมาก่อน)
  if(_retriesLeft===undefined) _retriesLeft=SAFE_TO_RETRY_ACTIONS_.includes(action)?2:0;
  try{
    return await apiGetOnce(action, params);
  }catch(e){
    if(_retriesLeft>0){
      await new Promise(r=>setTimeout(r,1200));
      return apiGet(action, params, _retriesLeft-1);
    }
    throw e;
  }
}
function apiGetOnce(action='all', params={}){
  if(!apiUrl) return Promise.reject(new Error('ยังไม่ได้ใส่ API URL'));
  const cb='jsonp_'+Date.now()+'_'+Math.floor(Math.random()*9999);
  const url=new URL(apiUrl);
  url.searchParams.set('action',action); url.searchParams.set('callback',cb);
  if(apiKey) url.searchParams.set('key',apiKey);
  Object.entries(params||{}).forEach(([k,v])=>url.searchParams.set(k,v));
  return new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    // v9.25: ข้อมูลโตขึ้นเรื่อยๆ Apps Script อาจใช้เวลานานกว่าเดิม เพิ่ม timeout จาก 60s เป็น 150s
    // และงานส่วนใหญ่ (Sync, Cycle Count, ฯลฯ) ยังทำสำเร็จฝั่ง Server แม้ browser จะ timeout ก่อนก็ตาม
    const timer=setTimeout(()=>{cleanup();reject(new Error('รอผลนานเกินไป (150 วินาที) แต่งานอาจจะสำเร็จฝั่ง Server แล้ว ลองกด Refresh/Sync อีกครั้งเพื่อเช็คผลจริง'))},150000);
    function cleanup(){clearTimeout(timer); delete window[cb]; s.remove();}
    window[cb]=data=>{cleanup(); data&&data.ok?resolve(data):reject(new Error(data?.error||'API error'))};
    s.onerror=()=>{cleanup();reject(new Error('เชื่อมต่อ API ไม่ได้ งานอาจจะสำเร็จฝั่ง Server แล้วก็ได้ ลองกด Refresh/Sync อีกครั้งเพื่อเช็คผลจริง'))};
    s.src=url.toString(); document.body.appendChild(s);
  });
}

async function apiPost(body,_retriesLeft){
  if(!apiUrl) throw new Error('ยังไม่ได้ใส่ API URL');
  // v9.45 fix: เดิม "การเขียน" ไม่เคย retry อัตโนมัติเลย เพราะกลัวเขียนซ้ำถ้า Server ทำสำเร็จไปแล้วแต่
  // client แค่รอผลไม่ทัน ผู้ใช้เลยต้องกดปุ่มเองซ้ำ ซึ่งเสี่ยงเขียนซ้ำพอกัน (หรือมากกว่า เพราะกดหลายครั้ง)
  // ตอนนี้แนบ requestId เดียวกันไว้ทุกครั้งที่พยายามคำขอเดิม ฝั่ง Server จะจำผลไว้แล้วกันไม่ให้รันซ้ำ
  // (ดู withIdempotency_ ใน .gs) ทำให้ auto-retry ได้อย่างปลอดภัยจริง ไม่ต้องมานั่งกดเองอีกต่อไป
  if(!body.requestId) body.requestId=Date.now()+'-'+Math.random().toString(36).slice(2);
  if(_retriesLeft===undefined) _retriesLeft=2;
  showSyncOverlay(syncActionLabel(body.action));
  // v9.11: ใช้ fastwrite ก่อน เพื่อลดเวลา setup/recalc ทั้งระบบของ Apps Script
  // ถ้า Apps Script ยังไม่ได้อัปเดต จะ fallback ไป write ตัวเดิมอัตโนมัติ
  try{
    let result;
    try{
      result=await apiGetOnce('fastwrite',{payload:JSON.stringify(body)});
    }catch(e){
      const msg=String(e && e.message || e);
      if(msg.includes('Unknown action') || msg.includes('API error') || msg.includes('fastwrite')){
        result=await apiGetOnce('write',{payload:JSON.stringify(body)});
      }else{
        throw e;
      }
    }
    hideSyncOverlaySuccess('บันทึกเข้า Google Sheet แล้ว');
    return result;
  }catch(e){
    const msg=String(e&&e.message||e);
    const isConnectionIssue=msg.includes('เชื่อมต่อ API ไม่ได้')||msg.includes('รอผลนานเกินไป');
    if(isConnectionIssue && _retriesLeft>0){
      await new Promise(r=>setTimeout(r,1500));
      return apiPost(body,_retriesLeft-1);
    }
    hideSyncOverlayError(msg);
    throw e;
  }
}

function chunkItemsBySize_(items, makeBody, maxLen=4000){
  // v9.48 fix: เดิมแบ่งตาม "จำนวนรายการคงที่" (15 ชิ้น) ซึ่งไม่พอ เพราะข้อความภาษาไทยตอน encode ใส่ URL
  // จะยาวขึ้น 2-3 เท่า (ตัวอักษรไทย 1 ตัว กลายเป็น %XX%XX%XX ถึง 9 ตัวอักษร) ทำให้แค่ 15 รายการที่มี
  // remark ภาษาไทยยาวๆ ก็ยาวเกิน URL limit ได้แล้ว ตอนนี้วัดความยาวจริงหลัง encode ก่อนตัดสินใจแบ่งชุด
  const chunks=[]; let current=[];
  for(const item of items){
    const trial=current.concat([item]);
    const len=encodeURIComponent(JSON.stringify(makeBody(trial))).length;
    if(current.length && len>maxLen){ chunks.push(current); current=[item]; }
    else current=trial;
  }
  if(current.length) chunks.push(current);
  return chunks;
}
async function apiPostBatched(action, items, chunkSize, makeBody){
  // v9.46: ตัวกลางกันปัญหา URL ยาวเกินตอนส่งหลายรายการพร้อมกัน (ระบบนี้ฝัง payload ไว้ใน URL)
  // v9.48: เปลี่ยนจากแบ่งตามจำนวนคงที่ เป็นแบ่งตามขนาดจริงหลัง encode (ดู chunkItemsBySize_)
  const chunks=chunkItemsBySize_(items, makeBody);
  for(const chunk of chunks){
    const body=makeBody(chunk);
    body.action=action;
    await apiPost(body);
  }
}

  if(!list.length) return;
  const payload=list.map(m=>{
    const q=(String(m.mode).toUpperCase()==='CYCLE_COUNT')?(+m.qty||0):Math.abs(+m.qty||0);
    return {MoveID:m.id,Timestamp:m.time,ItemType:m.type,SKU:m.sku,Mode:m.mode,Qty:q,Ref:m.ref||'',Remark:m.remark||'',StockAfter:m.stock||'',Source:'ERP-v8.3-BATCH'};
  });
  const pairs=list.map((m,i)=>({m,p:payload[i]}));
  // v9.48 fix: เปลี่ยนจากแบ่งตามจำนวนคงที่เป็นแบ่งตามขนาดจริงหลัง encode URL (ข้อความไทยใน Remark
  // ยาวขึ้นมากตอน encode ทำให้แค่จำกัดจำนวนรายการไม่พอ)
  try{
    const chunks=chunkItemsBySize_(pairs, chunk=>({action:'movementbatch',data:chunk.map(x=>x.p)}));
    for(const chunk of chunks){
      await apiPost({action:'movementbatch',data:chunk.map(x=>x.p)});
      chunk.forEach(x=>x.m.synced=true);
      saveLocalOnly();
    }
  }catch(e){
    // fallback: ชุดที่พังลองส่งทีละตัวแทน (เผื่อ Apps Script รุ่นเก่า หรือรายการใดรายการหนึ่งมีปัญหาเฉพาะตัว)
    const remaining=pairs.filter(x=>!x.m.synced);
    for(const x of remaining){
      await apiPost({action:'movement',data:x.p});
      x.m.synced=true;
    }
  }
  saveLocalOnly();
  if(!silent) sheetDone('บันทึก Movement เข้า Google Sheet เรียบร้อยแล้ว');
}

async function pushToGoogleSheet(silent=false){
  if(apiBusy){
    if(!silent) toast('ระบบกำลัง Sync อยู่ รอสักครู่');
    else scheduleAutoPush();
    return;
  }
  apiBusy=true;
  if(!silent) toast('กำลังบันทึกเฉพาะรายการค้างส่งขึ้น Google Sheet...');
  try{
    const pendingMov=(db.mov||[]).filter(x=>!x.synced).map(m=>({
      MoveID:m.id,Timestamp:m.time,ItemType:m.type,SKU:m.sku,Mode:m.mode,
      Qty:(String(m.mode).toUpperCase()==='CYCLE_COUNT')?(+m.qty||0):Math.abs(+m.qty||0),
      Ref:m.ref||'',Remark:m.remark||'',StockAfter:m.stock||'',Source:'ERP-fast-sync'
    }));
    const payload={
      movements:pendingMov,
      productionOrder:(db.po||[]).map(poPayload),
      orders:(db.orderDays||[]).map(orderPayload),
      orderItems:(db.orderDays||[]).flatMap(o=>(o.shortages||[]).map(s=>orderItemPayload(o.date,s)))
    };
    const total=pendingMov.length+payload.productionOrder.length+payload.orders.length+payload.orderItems.length;
    if(total===0){
      toast('ไม่มีรายการค้างส่งขึ้น Google Sheet');
      return;
    }
    await apiPost({action:'flushpending',data:payload});
    (db.mov||[]).forEach(m=>{ if(!m.synced) m.synced=true; });
    db.remote=db.remote||{}; db.remote.lastPush=now();
    saveLocalOnly();
    if(!silent) render();
    if(silent) toast('บันทึกอัตโนมัติขึ้น Google Sheet แล้ว');
    else sheetDone('บันทึกขึ้น Google Sheet สำเร็จ '+total+' รายการ');
  }catch(e){
    console.error(e);
    if(!silent) alert('บันทึกไม่ได้: '+(e.message||e));
    else toast('Auto save ไม่สำเร็จ: '+(e.message||e));
  }finally{apiBusy=false;}
}

/* ===== เช็ค Stock พอส่ง (ShippingPlan) — บันทึกลง Google Sheet ชีต ShippingPlan โดยตรง ===== */
function shippingKey(date,sku){return String(date||'')+'||'+String(sku||'');}
function shipStock(sku){const it=(db.items||[]).find(x=>String(x.sku)===String(sku)); return +(it?.stock||0);}
function shipHasAutoPO(date,sku){
  const tag='ShippingPlan '+date;
  return (db.po||[]).some(p=>String(p.sku||p.SKU||'')===String(sku) && String(p.remark||p.Remark||'').includes(tag));
}
function shipPlanRows(date){
  db.shippingPlan=db.shippingPlan||[];
  const planMap=new Map((db.shippingPlan||[]).filter(x=>!date||x.date===date).map(x=>[shippingKey(x.date,x.sku),x]));
  const rows=[];
  (db.items||[]).forEach(it=>{
    const p=planMap.get(shippingKey(date,it.sku));
    const total=(+(p?.baimiang||0))+(+(p?.b2b||0))+(+(p?.b2c||0));
    if(total>0 || date===todayISO()) rows.push({date,sku:it.sku,product:it.product||'',name:it.name||'',baimiang:+(p?.baimiang||0),b2b:+(p?.b2b||0),b2c:+(p?.b2c||0),remark:p?.remark||'',stock:shipStock(it.sku)});
  });
  (db.shippingPlan||[]).filter(x=>x.date===date && !(db.items||[]).some(it=>String(it.sku)===String(x.sku))).forEach(x=>rows.push({date,sku:x.sku,product:'',name:itemName(x.sku),baimiang:+x.baimiang||0,b2b:+x.b2b||0,b2c:+x.b2c||0,remark:x.remark||'',stock:shipStock(x.sku)}));
  return rows;
}
function shipCheckPage(m){
  const date=$('shipDate')?.value||todayISO();
  const q=($('shipQ')?.value||'').toLowerCase();
  const onlyShort=$('shipOnlyShort')?$('shipOnlyShort').checked:false;
  const onlyOrdered=$('shipOnlyOrdered')?$('shipOnlyOrdered').checked:true;
  // v9.51 fix: เดิม KPI และ "รายการต้องผลิตเพิ่ม" คำนวณจากข้อมูลที่ถูกกรองด้วย Product filter อยู่แล้ว
  // ทำให้ถ้ากรอกข้อมูล Nacho บันทึกแล้ว เปลี่ยนไปกรอก Nacho KETO ต่อ ตัวสรุปรวม/รายการต้องผลิต
  // จะเห็นแค่ Nacho KETO เหมือน Nacho หายไป (ทั้งที่ข้อมูลจริงใน Google Sheet ไม่ได้หายเลย แค่ตัวสรุป
  // มองไม่เห็นเพราะ filter บัง) ตอนนี้แยกชัดเจน: allRows = ทุก Product (ใช้กับ KPI/รายการต้องผลิตเพิ่ม)
  // ส่วน rows = เฉพาะที่กรองไว้ (ใช้กับตารางกรอกข้อมูลเท่านั้น)
  const allRows=shipPlanRows(date);
  let rows=allRows.filter(r=>matchesProdFilter('shipcheck',r.product) && (!q||(r.sku+' '+r.name+' '+r.product).toLowerCase().includes(q)));
  const need=allRows.reduce((a,r)=>a+r.baimiang+r.b2b+r.b2c,0);
  const shortage=allRows.reduce((a,r)=>a+Math.max(0,(r.baimiang+r.b2b+r.b2c)-r.stock),0);
  const ok=allRows.filter(r=>r.stock>=(r.baimiang+r.b2b+r.b2c)).length;
  let shownRows=rows;
  if(onlyOrdered) shownRows=shownRows.filter(r=>(r.baimiang+r.b2b+r.b2c)>0);
  if(onlyShort) shownRows=shownRows.filter(r=>r.stock<(r.baimiang+r.b2b+r.b2c));
  m.innerHTML=head('เช็ค Stock พอส่ง','ข้อมูลหน้านี้บันทึกลง Google Sheet ชีต ShippingPlan — Refresh แล้วไม่หาย')+
  `<div class="toolbar"><div class="row3"><input id="shipDate" type="date" value="${date}" onchange="shipCheckPage($('main'))"><span></span><input id="shipQ" value="${escHTML(q)}" oninput="rerenderKeepFocus(()=>shipCheckPage($('main')))" placeholder="ค้นหา SKU / ชื่อ"></div>${productChipsHTML('shipcheck','shipCheckPage')}<p class="mini">Filter/ค้นหาด้านบนมีผลกับ "ตารางกรอกข้อมูล" ด้านล่างเท่านั้น — KPI และ "รายการต้องผลิตเพิ่ม" นับรวมทุก Product เสมอ</p>`+
  `<div style="display:flex;gap:20px;flex-wrap:wrap;margin-top:10px"><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input id="shipOnlyOrdered" type="checkbox" ${onlyOrdered?'checked':''} onchange="shipCheckPage($('main'))" style="width:20px;height:20px"> แสดงเฉพาะ SKU ที่มีคำสั่งซื้อ</label><label style="display:flex;align-items:center;gap:8px;cursor:pointer"><input id="shipOnlyShort" type="checkbox" ${onlyShort?'checked':''} onchange="shipCheckPage($('main'))" style="width:20px;height:20px"> แสดงเฉพาะ SKU ที่ของไม่ครบ</label></div>`+
  `<div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap"><button class="primary" onclick="saveShippingPlan()">บันทึก ShippingPlan เข้า Google Sheet</button><button class="ghost" onclick="loadFromGoogleSheet()">Refresh จาก Google Sheet</button><button class="ghost" onclick="openShipPaste()">Paste จาก Excel</button><button class="primary" onclick="createPOFromShippingShortage()">สร้างคำสั่งผลิตจากรายการที่ขาด</button><button class="ghost" onclick="exportShipCheckCSV()">Export CSV</button></div></div>`+
  `<div class="kpis"><div class="kpi">Order ต้องส่งรวม<b>${need}</b></div><div class="kpi">SKU OK<b>${ok}</b></div><div class="kpi">SKU ต้องผลิต<b>${allRows.length-ok}</b></div><div class="kpi">ต้องผลิตเพิ่มรวม<b>${shortage}</b></div></div>`+
  `<div class="box"><h2>ตารางเช็ค Stock (${shownRows.length} จาก ${rows.length} SKU)</h2>${shipCheckTable(shownRows,date)}</div>`+
  `<div class="box"><h2>รายการต้องผลิตเพิ่ม (รวมทุก Product)</h2>${shipShortTable(allRows)}</div>`;
  applyViewerUI?.();
}
function shipCheckTable(rows,date){
  if(!rows.length) return '<p class="hint">ไม่มีรายการตรงกับตัวกรอง</p>';
  return `<table><tr><th>Date</th><th>SKU</th><th>Product</th><th>Product Name</th><th>BaiMiang</th><th>B2B</th><th>B2C</th><th>Total</th><th>Stock</th><th>Diff</th><th>Status</th><th>Remark</th></tr>${rows.map(r=>{
    const total=r.baimiang+r.b2b+r.b2c;
    const diff=r.stock-total;
    const wasShort=shipHasAutoPO(r.date||date,r.sku);
    const statusMain=diff<0?'<span class="pill bad">Production</span>':'<span class="pill good">OK</span>';
    const statusExtra=wasShort?' <span class="pill" style="background:#fff3cd;color:#7a5b00">เคยขาด • สั่งผลิตแล้ว</span>':'';
    return `<tr><td>${r.date}</td><td><b>${r.sku}</b></td><td>${escHTML(r.product)}</td><td>${escHTML(r.name)}</td><td><input id="ship_baimiang_${r.sku}" type="number" value="${r.baimiang||0}" min="0" style="max-width:90px" oninput="updateShipTotal('${r.sku}',${r.stock})" onkeydown="gridKeyNav(event,this)"></td><td><input id="ship_b2b_${r.sku}" type="number" value="${r.b2b||0}" min="0" style="max-width:90px" oninput="updateShipTotal('${r.sku}',${r.stock})" onkeydown="gridKeyNav(event,this)"></td><td><input id="ship_b2c_${r.sku}" type="number" value="${r.b2c||0}" min="0" style="max-width:90px" oninput="updateShipTotal('${r.sku}',${r.stock})" onkeydown="gridKeyNav(event,this)"></td><td><b id="ship_total_${r.sku}">${total}</b></td><td><b>${r.stock}</b></td><td><span id="ship_diff_${r.sku}" class="pill ${diff<0?'bad':'good'}">${diff}</span></td><td><span id="ship_status_${r.sku}">${statusMain}</span>${statusExtra}</td><td><input id="ship_remark_${r.sku}" value="${escHTML(r.remark||'')}" placeholder="หมายเหตุ" onkeydown="gridKeyNav(event,this)"></td></tr>`;
  }).join('')}</table>`;
}
function updateShipTotal(sku,stock){
  let total=0;
  ['baimiang','b2b','b2c'].forEach(k=>{ total+=+($('ship_'+k+'_'+sku)?.value||0); });
  const totalEl=$('ship_total_'+sku); if(totalEl) totalEl.textContent=total;
  const diff=stock-total;
  const diffEl=$('ship_diff_'+sku); if(diffEl){ diffEl.textContent=diff; diffEl.className='pill '+(diff<0?'bad':'good'); }
  const statusEl=$('ship_status_'+sku); if(statusEl){ statusEl.innerHTML=diff<0?'<span class="pill bad">Production</span>':'<span class="pill good">OK</span>'; }
}
function shipShortTable(rows){
  const arr=rows.map(r=>({...r,total:r.baimiang+r.b2b+r.b2c,diff:r.stock-(r.baimiang+r.b2b+r.b2c)})).filter(r=>r.diff<0).sort((a,b)=>a.diff-b.diff);
  if(!arr.length) return '<p class="hint">Stock พอส่งทั้งหมด</p>';
  return `<table><tr><th>SKU</th><th>ชื่อ</th><th>ต้องส่ง</th><th>Stock</th><th>ต้องผลิตเพิ่ม</th></tr>${arr.map(r=>`<tr><td><b>${r.sku}</b></td><td>${escHTML(r.name)}</td><td>${r.total}</td><td>${r.stock}</td><td><b class="danger">${Math.abs(r.diff)}</b></td></tr>`).join('')}</table><br><button class="primary" onclick="createPOFromShippingShortage()">สร้างคำสั่งผลิตจากรายการที่ขาดทั้งหมด</button>`;
}
function collectShippingRows(){
  const date=$('shipDate')?.value||todayISO();
  const rows=[];

    const sku=el.id.replace('ship_baimiang_','');

    // upsert ทีละแถวแล้ว ปลอดภัยเวลาส่งหลายชุดต่อกัน ไม่ทับ SKU ของชุดก่อนหน้า)

const SALES_CHANNELS=[['baimiang','BaiMiang'],['b2b','B2B'],['tiktok','TikTok'],['shopee','Shopee'],['lazada','Lazada'],['line','Line'],['grab','Grab']];
function salesOutKey(date,sku){return String(date||'')+'||'+String(sku||'');}
function salesOutRows(date){
  db.salesOut=db.salesOut||[];

function salesOutTotal(row){return SALES_CHANNELS.reduce((a,[k])=>a+(+row[k]||0),0);}

function salesOutTable(rows){
  if(!rows.length) return '<p class="hint">ไม่มีรายการตรงกับตัวกรอง</p>';

  }).join('')}</table>`;
}
function gridKeyNav(e,el){
  // ทุกหน้าที่มีตารางกรอกตัวเลขหลายแถว: กด Enter = ไปแถวถัดไปคอลัมน์เดิม, Shift+Enter = แถวก่อนหน้า
  // Tab ไปคอลัมน์ถัดไปใช้พฤติกรรมเบราว์เซอร์ปกติอยู่แล้ว (เรียงตามลำดับ input ในตาราง)
  if(e.key!=='Enter') return;
  e.preventDefault();
  const td=el.closest('td'); const tr=td?.closest('tr');
  if(!td||!tr) return;
  const cellIndex=Array.from(tr.children).indexOf(td);
  let row=e.shiftKey?tr.previousElementSibling:tr.nextElementSibling;
  while(row){
    const cell=row.children[cellIndex];
    const input=cell?.querySelector('input,select,textarea');
    if(input){ input.focus(); if(input.select) input.select(); return; }
    row=e.shiftKey?row.previousElementSibling:row.nextElementSibling;
  }
}

    SALES_CHANNELS.forEach(([k])=>{ const v=+($('so_'+k+'_'+sku)?.value||0); row[k]=v; total+=v; });

  return rows;
}

function head(t,h=''){return `<h1>${t}</h1><div class="hint">${h}</div>`}
function todayISO(){
  const d=new Date();
  return `${d.getFullYear()}-${erpPad(d.getMonth()+1)}-${erpPad(d.getDate())}`;
}
function dateISO(t){
  if(t===null || t===undefined || t==='') return '';
  if(typeof t==='number' || /^\d+(\.\d+)?$/.test(String(t).trim())){
    const d=excelSerialToDate(t);
    if(!d || isNaN(d)) return '';
    return `${d.getFullYear()}-${erpPad(d.getMonth()+1)}-${erpPad(d.getDate())}`;
  }
  let s=String(t||'').trim();
  // ISO หรือ yyyy-mm-dd / yyyy/mm/dd รวมกรณีปี พ.ศ. 2569 จาก Google Sheet
  let iso=s.match(/^(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
  if(iso){
    let y=+iso[1], mo=+iso[2], da=+iso[3];
    if(y>2400) y-=543;
    return String(y).padStart(4,'0')+'-'+erpPad(mo)+'-'+erpPad(da);
  }
  // รองรับ Google Form แบบ M/D/YYYY และไทยแบบ D/M/YYYY
  let m=s.match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(m){
    let a=+m[1], b=+m[2], y=+m[3];
    if(y>2400)y-=543;
    let mo, da;
    if(b>12){ mo=a; da=b; }      // M/D/YYYY เช่น 7/2/2026
    else if(a>12){ da=a; mo=b; } // D/M/YYYY เช่น 28/6/2026
    else { mo=a; da=b; }         // ถ้ากำกวม ใช้ M/D เพราะข้อมูล Google Form เป็นแนวนี้
    return String(y).padStart(4,'0')+'-'+erpPad(mo)+'-'+erpPad(da);
  }
  let d=new Date(s);
  if(isNaN(d)) return '';
  let y=d.getFullYear();
  if(y>2400) y-=543;
  return String(y).padStart(4,'0')+'-'+erpPad(d.getMonth()+1)+'-'+erpPad(d.getDate());
}

const DEFAULT_PROD_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSYNme5DqGdSFscQTOcVPBDC5cSjiBQ2Ag_tYFBjgEt7PH-WqnOqMB8V7B2WllQ0IFQoE0JA-ZZkUrA/pub?gid=1949740572&single=true&output=csv';

async function fetchCsvText(url){
  const clean=String(url||'').trim();
  const targets=[
    clean,
    'https://api.allorigins.win/raw?url='+encodeURIComponent(clean),
    'https://corsproxy.io/?'+encodeURIComponent(clean)
  ];
  let lastErr=null;
  for(const u of targets){
    try{
      const res=await fetch(u,{cache:'no-store'});
      if(!res.ok) throw new Error('HTTP '+res.status);
      const text=await res.text();
      if(text && text.includes('รหัสสินค้า')) return text;
      if(text && text.toLowerCase().includes('sku')) return text;
      if(text && text.length>20) return text;
    }catch(e){ lastErr=e; }
  }
  throw lastErr || new Error('Cannot fetch CSV');
}

function parseCsvRows(text){
  const rows=[]; let row=[], cur='', q=false;
  text=String(text||'').replace(/^\ufeff/,'');
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(c==='"'){
      if(q && n==='"'){cur+='"'; i++;}
      else q=!q;
    }else if(c===',' && !q){row.push(cur); cur='';}
    else if((c==='\n' || c==='\r') && !q){
      if(c==='\r' && n==='\n') i++;
      row.push(cur); cur='';
      if(row.some(v=>String(v).trim()!=='')) rows.push(row);
      row=[];
    }else cur+=c;
  }
  row.push(cur);
  if(row.some(v=>String(v).trim()!=='')) rows.push(row);
  return rows.map(r=>r.map(v=>String(v||'').trim()));
}

function parseProductionCsv(text){
  const rows=parseCsvRows(text);
  if(rows.length<2) return [];
  const headers=rows[0].map(h=>String(h||'').trim().toLowerCase());
  const find=(keys)=>{
    for(const k of keys){
      const kk=k.toLowerCase();
      let i=headers.findIndex(h=>h===kk || h.includes(kk));
      if(i>=0) return i;
    }
    return -1;
  };
  const iTime=find(['timestamp','ประทับเวลา','เวลา']);
  const iSku=find(['รหัสสินค้า','sku','skuid']);
  const iProd=find(['หมวดหมู่สินค้า','หมวด','product','category']);
  const iQty=find(['จำนวนที่ผลิตได้','จำนวน','qty','quantity']);
  const iExp=find(['expiry date','วันหมดอายุ','หมดอายุ','expiry']);
  const iOp=find(['ชื่อผู้บันทึก','ผู้บันทึก','operator','ชื่อ']);
  const iRem=find(['หมายเหตุ','remark','note']);
  const iPhoto=find(['แนบรูปภาพสินค้า','รูป','photo','image']);
  const iMfgDate=find(['วันที่ผลิต','mfg date','production date']);
  const iMfgTime=find(['เวลาที่ผลิต','mfg time','production time']);
  if(iSku<0 || iQty<0) return [];
  const out=[];
  rows.slice(1).forEach((r,idx)=>{
    const sku=(r[iSku]||'').trim();
    const rawQty=String(r[iQty]||'').replace(/,/g,'').trim();
    const qty=Number(rawQty);
    if(!sku || !qty) return;
    const timestamp=(iTime>=0?r[iTime]:'') || (iMfgDate>=0?r[iMfgDate]:'') || now();
    out.push({
      id:'GS-'+idx+'-'+sku+'-'+rawQty+'-'+String(timestamp).replace(/\W/g,''),
      timestamp,
      sku,
      product:iProd>=0?r[iProd]:'',
      qty,
      expiry:iExp>=0?r[iExp]:'',
      operator:iOp>=0?r[iOp]:'',
      remark:iRem>=0?r[iRem]:'',
      photo:iPhoto>=0?r[iPhoto]:'',
      mfgDate:iMfgDate>=0?r[iMfgDate]:'',
      mfgTime:iMfgTime>=0?r[iMfgTime]:'',
      source:'Google Sheet CSV'
    });
  });
  return out;
}

function productionSummaryTable(arr,total){

  return `<table><tr><th>Product</th><th>Variant</th><th>จำนวนรวม</th><th>คำสั่งผลิต ERP</th><th>QR Scan</th><th>บันทึกผลผลิต ERP</th><th>%</th></tr>${arr.map(x=>`<tr><td><b>${escHTML(x.product)}</b></td><td>${escHTML(x.variant)}</td><td><b style="font-size:22px;color:var(--brand)">${x.qty}</b></td><td>${x.po||0}</td><td>${x.qr||0}</td><td>${x.manual||0}</td><td>${total?Math.round(x.qty/total*100):0}%</td></tr>`).join('')}</table>`;
}
function productionSkuSummaryTable(rows){
  const map={};
  rows.forEach(r=>{
    const sku=String(r.sku||r.SKU||'');
    const info=prodSummaryItemInfo(sku);
    const key=sku;
    if(!map[key]) map[key]={sku,name:info.name,product:info.product,variant:info.variant,qty:0,po:0,qr:0,manual:0};
    map[key].qty += +r.qty||0;
    if(r.source==='คำสั่งผลิต ERP') map[key].po += +r.qty||0;
    else if(r.source==='บันทึกผลผลิต ERP') map[key].manual += +r.qty||0;
    else map[key].qr += +r.qty||0;
  });
  const arr=Object.values(map).sort((a,b)=>b.qty-a.qty);
  if(!arr.length)return '<p class="hint">ยังไม่มีรายละเอียด SKU</p>';
  return `<table><tr><th>SKU</th><th>ชื่อสินค้า</th><th>Product</th><th>Variant</th><th>จำนวนรวม</th><th>คำสั่งผลิต</th><th>QR</th><th>บันทึกเอง</th></tr>${arr.map(x=>`<tr><td><b>${escHTML(x.sku)}</b></td><td>${escHTML(x.name)}</td><td>${escHTML(x.product)}</td><td>${escHTML(x.variant)}</td><td><b>${x.qty}</b></td><td>${x.po||0}</td><td>${x.qr||0}</td><td>${x.manual||0}</td></tr>`).join('')}</table>`;
}

function prodRecordTable(list){

function toggleAllProdRec(checked){document.querySelectorAll('.prodRecChk').forEach(c=>{c.checked=checked; toggleProdRecQty(c.dataset.sku);});}
function toggleProdRecQty(sku){let q=$('prodrecqty_'+sku), chk=document.querySelector(`.prodRecChk[data-sku="${sku}"]`); if(chk?.checked && !q.value) q.value=$('recBulkQty')?.value||1; updateProdRecReq(sku);}
function fillCheckedProdQty(){let v=+$('recBulkQty').value||0; if(!v)return toast('ใส่จำนวนก่อน'); document.querySelectorAll('.prodRecChk:checked').forEach(c=>{let q=$('prodrecqty_'+c.dataset.sku); q.value=v; updateProdRecReq(c.dataset.sku);});}
function updateProdRecReq(sku){let q=+$('prodrecqty_'+sku)?.value||0; let el=$('prodreq_'+sku); if(el)el.innerHTML=reqText(sku,q);}
async function saveProductionRecord(){
  const rows=[...document.querySelectorAll('.prodRecChk:checked')].map(c=>({sku:c.dataset.sku,qty:+$('prodrecqty_'+c.dataset.sku).value||0})).filter(x=>x.qty>0);
  if(!rows.length)return toast('ติ๊ก SKU และใส่จำนวนผลิตก่อน');
  const ts=now(), operator=$('recOperator')?.value||'', expiry=$('recExpiry')?.value||'', remark=$('recRemark')?.value||'';
  const logs=rows.map((r,i)=>{let it=db.items.find(x=>x.sku==r.sku)||{}; return {LogID:'PR-'+Date.now()+'-'+i+'-'+r.sku,Timestamp:ts,SKU:r.sku,Product:it.product||'',Qty:r.qty,ExpiryDate:expiry,Operator:operator,Remark:remark,Photo:'',Source:'ERP-Manual'};});
  toast('กำลังบันทึกผลผลิต '+logs.length+' รายการเข้า Google Sheet...');
  try{
    await saveProductionBatchDirect(logs);
    logs.forEach(l=>{
      db.prodLog=db.prodLog||[]; db.prodLog.push({id:l.LogID,timestamp:l.Timestamp,sku:l.SKU,product:l.Product,qty:+l.Qty||0,expiry:l.ExpiryDate,operator:l.Operator,remark:l.Remark,photo:'',source:l.Source});
      let fg=db.items.find(x=>x.sku==l.SKU); if(fg) fg.stock=(+fg.stock||0)+(+l.Qty||0);
      const fgMove={id:'MV-'+Date.now()+'-FG-'+l.SKU,time:ts,type:'FG',sku:l.SKU,mode:'IN',qty:+l.Qty||0,ref:l.LogID,remark:'Production record',stock:fg?fg.stock:'',synced:true};
      db.mov.push(fgMove);
      (db.bom[l.SKU]||[]).forEach(b=>{let rm=db.rm.find(x=>x.sku==b.sku); let used=(+b.qty||0)*(+l.Qty||0); if(rm) rm.stock=(+rm.stock||0)-used; db.mov.push({id:'MV-'+Date.now()+'-RM-'+b.sku,time:ts,type:'RM',sku:b.sku,mode:'OUT',qty:-used,ref:l.LogID,remark:'BOM issue by production record',stock:rm?rm.stock:'',synced:true});});
    });
    saveLocalOnly(); render(); sheetDone('บันทึกผลผลิตสำเร็จ '+logs.length+' รายการ / ตัด BOM แล้ว');
  }catch(e){console.error(e); alert('บันทึกผลผลิตไม่สำเร็จ / ยังไม่บันทึกใน ERP: '+(e.message||e));}
}

function trxStatusPill(s){s=String(s||'Active'); return s.toLowerCase()==='voided'?'<span class="pill bad">Voided</span>':'<span class="pill good">Active</span>';}
function productionTransactions(){
  const fromLog=(db.prodLog||[]).map(r=>{let it=(db.items||[]).find(x=>String(x.sku)==String(r.sku))||{}; return {id:r.id||r.LogID||'',time:r.timestamp||r.Timestamp||'',type:r.source||r.Source||'Production',kind:'FG',sku:r.sku||r.SKU||'',name:it.name||'',product:it.product||r.product||r.Product||'',variant:it.variant||it.weight||'',qty:+(r.qty||r.Qty||0),operator:r.operator||r.Operator||'',remark:r.remark||r.Remark||'',status:r.status||r.Status||'Active',voidReason:r.voidReason||r.VoidReason||'',voidAt:r.voidAt||r.VoidAt||''};});
  // v9.39 fix: กันเหนียวเผื่อ QR scan บางรายการอยู่ใน StockMovement แต่ไม่มาโผล่ใน ProductionLog
  // (เช่น ช่วง sync ไม่สมบูรณ์) ดึงมาโชว์เพิ่มด้วย กันไม่ให้หายไปจากหน้านี้เฉยๆ
  const seenIds=new Set(fromLog.map(x=>String(x.id)));
  const fromMovAuto=(db.mov||[]).filter(mv=>String(mv.source||'')==='GoogleFormCSV-auto' && String(mv.type||'').toUpperCase()==='FG' && mv.ref && !seenIds.has(String(mv.ref)))
    .map(mv=>{let it=(db.items||[]).find(x=>String(x.sku)==String(mv.sku))||{}; return {id:mv.ref,time:mv.time,type:'QR / Google Form (movement)',kind:'FG',sku:mv.sku,name:it.name||'',product:it.product||'',variant:it.variant||'',qty:+mv.qty||0,operator:'',remark:mv.remark||'',status:'Active',voidReason:'',voidAt:''};});
  // v9.44: เพิ่ม Transaction ของวัตถุดิบ (RM) เข้ามาด้วย พร้อมปุ่ม Void (สร้างรายการย้อนกลับ ไม่ลบของเดิม)
  const voidRefs=new Set((db.mov||[]).filter(mv=>String(mv.source||'')==='ERP-VOID-RM' && mv.ref).map(mv=>String(mv.ref)));
  const fromRM=(db.mov||[]).filter(mv=>String(mv.type||'').toUpperCase()==='RM')
    .map(mv=>{let rmIt=(db.rm||[]).find(x=>String(x.sku)==String(mv.sku))||{}; const isVoidReverse=String(mv.source||'')==='ERP-VOID-RM'; const alreadyVoided=voidRefs.has('VOID-'+String(mv.id||'')); return {id:mv.id||mv.ref||'',time:mv.time,type:'วัตถุดิบ: '+(mv.mode||''),kind:'RM',sku:mv.sku,name:rmIt.name||'',product:rmIt.product||'Raw Material',variant:rmIt.variant||'',qty:+mv.qty||0,operator:'',remark:mv.remark||'',status:'Active',voidReason:'',voidAt:'',isVoidReverse,alreadyVoided};});
  return fromLog.concat(fromMovAuto,fromRM);
}
function trxSortKey(t){const d=new Date(t); return isNaN(d)?0:d.getTime();}

  let q=($('trxQ')?.value||'').toLowerCase();
  let st=$('trxStatus')?.value||'Active';
  let kind=$('trxKind')?.value||'All';
  let arr=productionTransactions().sort((a,b)=>trxSortKey(b.time)-trxSortKey(a.time));
  arr=arr.filter(x=>(!q || (x.id+' '+x.sku+' '+x.name+' '+x.product+' '+x.variant+' '+x.operator+' '+x.remark).toLowerCase().includes(q)) && (st==='All' || String(x.status||'Active')===st) && (kind==='All' || x.kind===kind));
  m.innerHTML=head('Transaction Center','ใช้ยกเลิกข้อมูลผลผลิตที่คีย์ผิด โดยไม่ลบประวัติ และทำ Reverse Stock ให้ (FG เท่านั้น) — วัตถุดิบไว้ดูประวัติ')+
  `<div class="toolbar row3"><input id="trxQ" value="${escHTML(q)}" oninput="rerenderKeepFocus(()=>transactionCenterPage($('main')))" placeholder="ค้นหา LogID / SKU / Product / ผู้บันทึก"><select id="trxStatus" onchange="transactionCenterPage($('main'))"><option ${st==='Active'?'selected':''}>Active</option><option ${st==='Voided'?'selected':''}>Voided</option><option ${st==='All'?'selected':''}>All</option></select><select id="trxKind" onchange="transactionCenterPage($('main'))"><option value="All" ${kind==='All'?'selected':''}>ทุกประเภท</option><option value="FG" ${kind==='FG'?'selected':''}>สินค้าสำเร็จรูป (FG)</option><option value="RM" ${kind==='RM'?'selected':''}>วัตถุดิบ (RM)</option></select></div><div class="row3" style="margin-top:8px"><button class="ghost" onclick="loadFromGoogleSheet()">โหลดข้อมูลจาก Google Sheet</button><span></span><span></span></div>`+
  `<div class="box"><h2>รายการผลผลิต / วัตถุดิบ / QR / บันทึกผลผลิต (${arr.length} รายการ)</h2>${transactionTable(arr)}</div>`;
}
function transactionTable(arr){
  if(!arr.length)return '<p class="hint">ไม่พบรายการ</p>';
  return `<table><tr><th>เวลา</th><th>LogID</th><th>Source</th><th>SKU</th><th>Product</th><th>Variant</th><th>Qty</th><th>ผู้บันทึก</th><th>Status</th><th></th></tr>${arr.map(x=>{
    let actionCell='';
    if(x.kind==='FG' && String(x.status||'Active')!=='Voided'){
      actionCell=`<button class="small danger" onclick="voidProductionPrompt('${escHTML(x.id)}')">Void</button>`;
    }else if(x.kind==='RM'){
      if(x.isVoidReverse){ actionCell='<span class="mini">รายการย้อนกลับ</span>'; }
      else if(x.alreadyVoided){ actionCell='<span class="mini">Void แล้ว</span>'; }
      else { actionCell=`<button class="small danger" onclick="voidRMMovementPrompt('${escHTML(x.id)}')">Void</button>`; }
    }
    return `<tr><td>${x.time}</td><td><b>${x.id}</b></td><td>${x.type}</td><td><b>${x.sku}</b><br><span class="mini">${escHTML(x.name)}</span></td><td>${escHTML(x.product)}</td><td>${escHTML(x.variant)}</td><td><b>${x.qty}</b></td><td>${escHTML(x.operator)}</td><td>${trxStatusPill(x.status)}${x.voidReason?'<br><span class="mini">'+escHTML(x.voidReason)+'</span>':''}</td><td>${actionCell}</td></tr>`;
  }).join('')}</table>`;
}
function voidProductionPrompt(logId){
  if(!logId)return;
  let reason=prompt('ยืนยันยกเลิก Transaction นี้\n\nLogID: '+logId+'\n\nใส่เหตุผล เช่น คีย์จำนวนผิด / SKU ผิด');
  if(reason===null)return;
  reason=String(reason||'').trim();
  if(!reason)return toast('ต้องใส่เหตุผลก่อน');
  if(!confirm('Void รายการ '+logId+' ?\nระบบจะ Reverse FG/RM Stock อัตโนมัติ'))return;
  voidProductionTransaction(logId,reason);
}
function voidRMMovementPrompt(moveId){
  if(!moveId)return;
  let reason=prompt('ยืนยันยกเลิกรายการวัตถุดิบนี้\n\nMoveID: '+moveId+'\n\nใส่เหตุผล เช่น คีย์จำนวนผิด / บันทึกผิดรายการ');
  if(reason===null)return;
  reason=String(reason||'').trim();
  if(!reason)return toast('ต้องใส่เหตุผลก่อน');
  if(!confirm('Void รายการวัตถุดิบ '+moveId+' ?\nระบบจะสร้างรายการย้อนกลับให้อัตโนมัติ (ไม่ลบรายการเดิม)'))return;
  voidRMMovement(moveId,reason);
}
async function voidRMMovement(moveId,reason){
  if(!moveId)return;
  toast('กำลัง Void รายการวัตถุดิบ...');
  const mv=(db.mov||[]).find(x=>String(x.id||x.ref||'')===String(moveId));
  try{
    const res=await apiPost({action:'voidrmmovementfast',moveId,reason});
    if(mv){
      // v9.44: คำนวณย้อนกลับ Stock ในเครื่องทันที เหมือนกับ Void FG ไม่ต้องรอโหลดข้อมูลทั้งหมดใหม่
      const rmItem=(db.rm||[]).find(x=>String(x.sku)===String(mv.sku));
      if(rmItem){
        const mode=String(mv.mode||'').toUpperCase();
        const qty=+mv.qty||0;
        const isAdd=['IN','ADJ_IN','RETURN','RECEIVE'].includes(mode);
        rmItem.stock=(+rmItem.stock||0)+(isAdd?-qty:qty);
      }
      db.mov=db.mov||[];
      db.mov.push({id:res?.reverseMoveId||('MV-'+Date.now()),time:now(),type:'RM',sku:mv.sku,mode:(['IN','ADJ_IN','RETURN','RECEIVE'].includes(String(mv.mode||'').toUpperCase())?'ADJ_OUT':'ADJ_IN'),qty:+mv.qty||0,ref:'VOID-'+moveId,remark:'Void RM movement: '+reason,stock:rmItem?.stock||0,source:'ERP-VOID-RM',synced:true});
    }
    saveLocalOnly(); page='trx'; render();
    sheetDone('Void รายการวัตถุดิบสำเร็จ / Stock อัปเดตแล้ว');
  }catch(e){
    try{ await loadFromGoogleSheet(); page='trx'; render(); }catch(e2){ console.error('refresh after RM void failed', e2); }
    alert('การเชื่อมต่อตอน Void มีปัญหา (Server มักทำงานเสร็จจริงแล้ว): '+(e.message||e)+'\n\nระบบโหลดข้อมูลล่าสุดให้แล้ว เช็คในตารางว่า Void สำเร็จหรือยัง');
  }
}

function parsePasteRows(text){let lines=String(text||'').trim().split(/\r?\n/).filter(Boolean); if(!lines.length)return []; let sep=lines[0].includes('\t')?'\t':','; return lines.map(line=>{let out=[], cur='', q=false; for(let i=0;i<line.length;i++){let ch=line[i]; if(ch=='"'){q=!q; continue;} if(ch==sep && !q){out.push(cur); cur='';} else cur+=ch;} out.push(cur); return out.map(x=>x.trim());});}
function importFgPaste(){let rows=parsePasteRows($('fgPaste').value); if(rows.length<2)return toast('วางข้อมูลพร้อมหัวตารางก่อน'); let h=rows[0].map(x=>x.toLowerCase()); const find=(names)=>names.map(n=>h.findIndex(x=>x.includes(n))).find(i=>i>=0); let iSku=find(['sku','รหัสสินค้า']), iQty=find(['จำนวน','qty']), iProd=find(['หมวด','product']), iExp=find(['expiry','หมดอายุ']), iOp=find(['ผู้บันทึก','operator','ชื่อ']), iRem=find(['หมายเหตุ','remark']), iTime=find(['timestamp','เวลา']); let added=0; for(let r of rows.slice(1)){let sku=r[iSku]||''; let qty=+(r[iQty]||0); if(!sku||!qty)continue; let rec={id:'FGP-'+Date.now()+'-'+added,timestamp:r[iTime]||now(),sku,product:r[iProd]||'',qty,expiry:r[iExp]||'',operator:r[iOp]||'',remark:r[iRem]||'',source:'Paste'}; db.prodLog=db.prodLog||[]; if(!db.prodLog.some(x=>x.id==rec.id||((x.timestamp||'')==rec.timestamp&&x.sku==rec.sku&&(+x.qty||0)==qty))) {db.prodLog.push(rec); added++;}}
  save(); render(); toast('Import Production Log แล้ว '+added+' รายการ')}

function togglePoQty(sku){let q=$('poqty_'+sku), chk=document.querySelector(`.poChk[data-sku="${sku}"]`); if(chk?.checked && !q.value) q.value=$('bulkQty')?.value||1; updateBulkReq(sku)}
function fillCheckedQty(){let v=+$('bulkQty').value||0; if(!v)return toast('ใส่จำนวนก่อน'); document.querySelectorAll('.poChk:checked').forEach(c=>{let q=$('poqty_'+c.dataset.sku); q.value=v; updateBulkReq(c.dataset.sku)});}
function updateBulkReq(sku){let q=+$('poqty_'+sku)?.value||0; let el=$('poreq_'+sku); if(el)el.innerHTML=reqText(sku,q)}
function nextPoSeq(){
  // v9.39 fix: db.seq เป็นตัวนับในเครื่องล้วนๆ ตั้งแต่เลิกอ่าน localStorage (v9.32) มันจะรีเซ็ตเป็น 1
  // ทุกครั้งที่โหลดหน้าใหม่ ทำให้ PO ใหม่ได้เลขซ้ำกับของเดิมที่เคยมีอยู่แล้ว (เช่น PO-00001 ซ้ำ)
  // แล้ว "ทับ" ของเดิมหายไปเงียบๆ เพราะระบบ upsert ด้วย key เดียวกัน ตอนนี้คำนวณเลขถัดไปจาก
  // ข้อมูล PO จริงที่โหลดมาจาก Google Sheet แทน ไม่พึ่งตัวนับในเครื่องอีกต่อไป
  let max=0;
  (db.po||[]).forEach(p=>{
    const m=String(p.id||'').match(/^PO-(\d+)$/);
    if(m) max=Math.max(max, parseInt(m[1],10));
  });
  return max+1;
}
async function createBulkPO(){
  let rows=[...document.querySelectorAll('.poChk:checked')].map(c=>({sku:c.dataset.sku,qty:+$('poqty_'+c.dataset.sku).value||0})).filter(x=>x.qty>0);
  if(!rows.length)return toast('ติ๊ก SKU และใส่จำนวนก่อน');
  let remark=$('bulkRemark')?.value||'';
  const baseSeq=nextPoSeq();
  const created=rows.map((r,i)=>({id:'PO-'+String(baseSeq+i).padStart(5,'0'),sku:r.sku,qty:r.qty,status:'Open',time:now(),start:'',finish:'',remark}));
  toast('กำลังบันทึกสั่งผลิต '+created.length+' รายการเข้า Google Sheet...');
  try{
    await savePOBatchDirect(created);
    db.po.push(...created);
    saveLocalOnly();
    render();
    sheetDone('สั่งผลิต '+created.length+' รายการเข้า Google Sheet แล้ว');
  }catch(e){
    console.error(e);
    alert('สั่งผลิตไม่สำเร็จ / ยังไม่บันทึกใน ERP: '+(e.message||e));
  }
}
async function createPO(){let sku=$('psku')?.value, qty=+$('pqty')?.value; if(!sku||!qty) return toast('เลือก SKU และจำนวน'); let id='PO-'+String(nextPoSeq()).padStart(5,'0'); let p={id,sku,qty,status:'Open',time:now(),start:'',finish:'',remark:$('premark')?.value||''}; toast('กำลังบันทึก '+id+' เข้า Google Sheet...'); try{await savePODirect(p); db.po.push(p); saveLocalOnly(); render(); sheetDone('สร้าง '+id+' เข้า Google Sheet แล้ว');}catch(e){console.error(e); alert('สร้างงานผลิตไม่สำเร็จ: '+(e.message||e));}}
function poTableCompact(arr){if(!arr.length)return '<p class="hint">ยังไม่มีงาน</p>'; return `<table><tr><th>เวลา</th><th>PO</th><th>SKU</th><th>จำนวน</th><th>สถานะ</th><th></th></tr>${arr.map(p=>{
  const hasActual=p.actualQty!==undefined&&p.actualQty!==''&&p.actualQty!==null;
  const qtyDisplay=hasActual&&+p.actualQty!==+p.qty ? `${p.qty}→<b>${p.actualQty}</b>` : p.qty;
  return `<tr><td>${p.time}</td><td>${p.id}</td><td>${p.sku}</td><td>${qtyDisplay}</td><td>${statusPill(p.status)}</td><td class="actions">${poActions(p)}</td></tr>`;
}).join('')}</table>`}
function poTable(arr){if(!arr.length)return '<p class="hint">ยังไม่มีงาน</p>'; return `<table><tr><th>เวลา</th><th>PO</th><th>SKU</th><th>จำนวน</th><th>สถานะ</th><th>RM ที่ต้องใช้</th><th></th></tr>${arr.map(p=>{
  const hasActual=p.actualQty!==undefined&&p.actualQty!==''&&p.actualQty!==null;
  const qtyDisplay=hasActual&&+p.actualQty!==+p.qty
    ? `สั่ง ${p.qty} / <b class="${+p.actualQty>+p.qty?'good':'danger'}">ผลิตจริง ${p.actualQty}</b>`
    : (hasActual ? `${p.qty} <span class="mini">(ตรงตามแผน)</span>` : p.qty);
  return `<tr><td>${p.time}</td><td>${p.id}</td><td>${p.sku}</td><td>${qtyDisplay}</td><td>${statusPill(p.status)}</td><td>${reqText(p.sku,p.qty)}</td><td class="actions">${poActions(p)}</td></tr>`;
}).join('')}</table>`}
function statusPill(s){let c=s=='Completed'?'good':s=='Cancelled'?'bad':''; return `<span class="pill ${c}">${s}</span>`}
function poActions(p){let id=p.id; if(p.status=='Open')return `<button class="small" onclick="completePO('${id}')">Complete</button><button class="small danger" onclick="setPO('${id}','Cancelled')">Cancel</button>`; return ''}
async function setPO(id,s){
  let p=db.po.find(x=>x.id==id); if(!p) return;
  const prevStatus=p.status, prevFinish=p.finish;
  p.status=s; if(s=='Finished')p.finish=now();
  saveLocalOnly(); render();
  // v9.42 fix: เดิมยิง savePODirect(p) แบบไม่รอผล (fire-and-forget) แล้วขึ้น toast "สำเร็จ" ทันที
  // ถ้าการบันทึกจริงล้มเหลว (เน็ตหลุด/timeout) ผู้ใช้จะเห็นว่า "Cancelled" แล้วในเครื่อง แต่ Google Sheet
  // ยังเป็นสถานะเดิมอยู่ ทำให้ระบบอื่นที่เช็คสถานะจริงจากชีต (เช่น กันสร้าง PO ซ้ำจาก ShippingPlan)
  // ยังเห็น PO นี้เป็น Active อยู่ ตอนนี้รอผลจริงก่อน ถ้าล้มเหลวจะย้อนสถานะกลับให้อัตโนมัติ
  try{
    await apiPost({action:'upsert',sheet:'ProductionOrder',key:'PO',data:poPayload(p)});
    sheetDone('เปลี่ยนสถานะเป็น '+s+' แล้ว / ส่งเข้า Google Sheet สำเร็จจริง');
  }catch(e){
    p.status=prevStatus; p.finish=prevFinish;
    saveLocalOnly(); render();
    alert('เปลี่ยนสถานะไม่สำเร็จ: '+(e.message||e)+'\n\nสถานะใน ERP ถูกย้อนกลับเป็น "'+prevStatus+'" แล้ว (ของจริงใน Google Sheet ไม่เคยเปลี่ยน) ลองกดใหม่อีกครั้ง');
  }
}
function completePO(id){
  let p=db.po.find(x=>x.id==id); if(!p) return;
  modal(`<h2>ยืนยันจำนวนที่ผลิตได้จริง</h2><p class="hint">${p.sku} · สั่งผลิต ${p.qty} ชิ้น — ใส่จำนวนที่ทำได้จริง (ถ้าเท่ากับที่สั่งไว้ไม่ต้องแก้)<br>ระบบจะตัดวัตถุดิบ (BOM) ตามจำนวนที่ใส่นี้เลย</p><input id="actualQtyInput" type="number" min="0" value="${p.qty}" style="font-size:20px;text-align:center"><br><br><button class="primary" onclick="confirmCompletePO('${id}')">ยืนยัน / ตัด RM / รับเข้า Stock</button> <button class="ghost" onclick="$('modal').style.display='none'">ยกเลิก</button>`);
}
function confirmCompletePO(id){
  let p=db.po.find(x=>x.id==id); if(!p) return;
  let actual=+$('actualQtyInput')?.value;
  if(isNaN(actual)||actual<0) return toast('ใส่จำนวนที่ผลิตได้จริงก่อน');
  const bomLines=db.bom[p.sku]||[];
  // v9.43: เดิมตัด RM ตอนกด "Start" โดยใช้จำนวนที่สั่งไว้ (p.qty) แยกขั้นตอนจากตอนใส่จำนวนจริง
  // ตอนนี้รวมเป็นขั้นตอนเดียว (Open → Complete) ตัด RM ตามจำนวนที่ผลิตได้จริงที่เพิ่งกรอก ไม่ใช่จำนวนที่สั่ง
  if(!bomLines.length && !confirm('SKU '+p.sku+' ยังไม่ได้ตั้ง BOM จะบันทึกโดยไม่ตัดวัตถุดิบเลยหรือไม่?')) return;
  $('modal').style.display='none';
  const before=(db.mov||[]).length;
  bomLines.forEach(r=>move('RM',r.sku,'OUT',(+r.qty||0)*actual,p.id,'Issue to production (ตัดตามจำนวนผลิตจริง)'));
  move('FG',p.sku,'IN',actual,p.id,'Production completed'+(actual!==+p.qty?` (สั่ง ${p.qty} / ผลิตจริง ${actual})`:''));
  p.status='Completed'; p.finish=now(); p.actualQty=actual;
  saveLocalOnly(); render(); sendNewMovementsSince(before); savePODirect(p);
  toast(actual===+p.qty?'Completed / ตัด RM แล้ว / รับ FG เข้า Stock แล้ว / ส่งเข้า Google Sheet':`Completed ตัด RM ตามจำนวนจริง ${actual} ชิ้น (สั่ง ${p.qty}) / ส่งเข้า Google Sheet`);
}

function getOrderDay(date){db.orderDays=db.orderDays||[]; let os=db.orderDays.find(x=>x.date==date); if(!os){os={date,total:0,shipped:0,note:'',shortages:[]};} return os;}
function upsertOrderDay(os){db.orderDays=db.orderDays||[]; let i=db.orderDays.findIndex(x=>x.date==os.date); if(i>=0) db.orderDays[i]=os; else db.orderDays.push(os);}
function saveOrderDay(){let date=$('orderDate').value||todayISO(); let os=getOrderDay(date); os.date=date; os.total=+$('oday_total').value||0; os.shipped=Math.min(+$('oday_shipped').value||0, os.total); os.note=$('oday_note').value||''; os.shortages=os.shortages||[]; upsertOrderDay(os); saveLocalOnly(); render(); saveOrderDirect(os); toast('บันทึกสรุป Order แล้ว / ส่งเข้า Google Sheet ทันที')}
function addShortageLine(){let date=$('orderDate').value||todayISO(); let os=getOrderDay(date); os.total=+$('oday_total').value||0; os.shipped=Math.min(+$('oday_shipped').value||0, os.total); os.note=$('oday_note').value||''; let sku=$('shortSku').value, qty=+$('shortQty').value||0, reason=$('shortReason').value||''; if(!sku||qty<=0)return toast('เลือก SKU และใส่จำนวนที่ขาด'); let line={sku,qty,reason}; os.shortages=os.shortages||[]; os.shortages.push(line); upsertOrderDay(os); saveLocalOnly(); render(); saveOrderDirect(os); saveOrderItemDirect(date,line); toast('เพิ่มรายการขาดแล้ว / ส่งเข้า Google Sheet ทันที')}
function removeShortageLine(date,i){let os=getOrderDay(date); let removed=(os.shortages||[])[i]; (os.shortages||[]).splice(i,1); upsertOrderDay(os); saveLocalOnly(); render(); saveOrderDirect(os); if(removed) deleteSheet('OrderItems','OrderNo','DAY-'+date+'-'+removed.sku,'OrderItems'); toast('ลบรายการแล้ว / อัปเดต Google Sheet')}
function updateShortageReason(date,i,val){let os=getOrderDay(date); if(os.shortages&&os.shortages[i]){os.shortages[i].reason=val; upsertOrderDay(os); saveLocalOnly(); saveOrderItemDirect(date,os.shortages[i]);}}

function saveGoogleConfig(){db.remote=db.remote||{};db.remote.url=$('gurl').value.trim();db.remote.autoSync=$('gauto').checked;save();toast('บันทึก Google Config แล้ว')}
async function syncOne(rec){if(!db.remote?.url)return; try{await fetch(db.remote.url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain'},body:JSON.stringify({action:'movement',movement:rec})}); rec.synced=true; db.remote.lastSync=now(); save();}catch(e){console.warn(e)}}
async function syncAll(){if(!db.remote?.url)return toast('ใส่ Apps Script URL ก่อน'); let list=db.mov.filter(x=>!x.synced); if(!list.length)return toast('ไม่มี Movement ค้าง Sync'); for(const r of list){await syncOne(r)} render(); toast('Sync ไป Google Sheets แล้ว')}
async function pullGoogleForm(){if(!db.remote?.url)return toast('ใส่ Apps Script URL ก่อน'); try{let res=await fetch(db.remote.url+'?action=movements'); let data=await res.json(); let count=0; (data.movements||[]).forEach(r=>{if(db.mov.some(x=>x.id==r.id))return; let mode=(r.mode||'IN').toUpperCase(), type=(r.type||'FG').toUpperCase(), qty=+r.qty||0, sku=r.sku; if(!sku||!qty)return; move(type,sku,mode,qty,r.ref||'GoogleForm',r.remark||'Import from Google Form'); db.mov[db.mov.length-1].id=r.id||db.mov[db.mov.length-1].id; db.mov[db.mov.length-1].synced=true; count++;}); db.remote.lastSync=now(); save(); render(); toast('ดึงข้อมูลจาก Google แล้ว '+count+' รายการ')}catch(e){toast('ดึงข้อมูลไม่ได้: เช็ค URL/สิทธิ์ Deploy')}}
function showAppsScript(){modal(`<h2>Google Apps Script Code</h2><p class="hint">สร้าง Apps Script ที่ผูกกับ Google Sheet แล้ววาง Code นี้ จากนั้น Deploy เป็น Web App: Execute as Me, Who has access = Anyone with the link</p><textarea style="height:420px;font-family:Consolas,monospace" readonly>${APPS_SCRIPT_CODE.replaceAll('&','&amp;').replaceAll('<','&lt;')}</textarea>`)}
const APPS_SCRIPT_CODE = `const SS = SpreadsheetApp.getActive();
function setup(){
  ['Stock_Movement','Production_Log'].forEach(name=>{ if(!SS.getSheetByName(name)) SS.insertSheet(name); });
  const sh=SS.getSheetByName('Stock_Movement');
  if(sh.getLastRow()==0) sh.appendRow(['id','time','type','sku','mode','qty','ref','remark','stock','source']);
  const po=SS.getSheetByName('Production_Log');
  if(po.getLastRow()==0) po.appendRow(['id','time','sku','qty','status','start','finish','remark']);
}
function doPost(e){
  setup();
  const data=JSON.parse(e.postData.contents||'{}');
  if(data.action==='movement') appendMovement(data.movement,'ERP');
  if(data.action==='movements') (data.movements||[]).forEach(r=>appendMovement(r,'ERP'));
  return json({ok:true});
}
function doGet(e){
  setup();
  const action=e.parameter.action||'';
  if(action==='movements') return json({ok:true,movements:readAllMovements()});
  return json({ok:true,message:'Bakery ERP Google Sheet API'});
}
function appendMovement(r,source){
  const sh=SS.getSheetByName('Stock_Movement');
  sh.appendRow([r.id||Utilities.getUuid(),r.time||new Date(),r.type||'',r.sku||'',r.mode||'',Number(r.qty||0),r.ref||'',r.remark||'',r.stock||'',source||'']);
}
function readAllMovements(){
  let rows=[];
  ['Stock_Movement','Form Responses 1','Form_Receive'].forEach(name=>{
    const sh=SS.getSheetByName(name); if(!sh||sh.getLastRow()<2)return;
    const values=sh.getDataRange().getValues(); const h=values.shift().map(x=>String(x).toLowerCase().trim());
    values.forEach((v,i)=>{ const get=(names)=>{for(const n of names){let ix=h.indexOf(n); if(ix>=0)return v[ix]} return ''};
      const sku=get(['sku','skuid','รหัส','รหัสสินค้า']); const qty=get(['qty','quantity','จำนวน']); if(!sku||!qty)return;
      rows.push({id:get(['id'])||name+'-'+(i+2),time:get(['time','timestamp','เวลา','ประทับเวลา'])||'',type:get(['type','item type','ประเภท'])||'FG',sku,mode:get(['mode','transaction','รับเข้า/ออก','รายการ'])||'IN',qty,ref:get(['ref','reference'])||name,remark:get(['remark','หมายเหตุ'])||''});
    });
  });
  return rows;
}
function json(o){return ContentService.createTextOutput(JSON.stringify(o)).setMimeType(ContentService.MimeType.JSON);}`;


function escHTML(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function csvEscape(v){v=String(v??''); return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function downloadText(filename, text, mime='text/csv;charset=utf-8'){let a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([text],{type:mime})); a.download=filename; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);}
function parseCSVLine(line){let out=[], cur='', q=false; for(let i=0;i<line.length;i++){let c=line[i]; if(c=='"'){ if(q && line[i+1]=='"'){cur+='"'; i++;} else q=!q; } else if(c==',' && !q){out.push(cur); cur='';} else cur+=c;} out.push(cur); return out;}
function parseTableText(txt){txt=(txt||'').trim(); if(!txt)return []; let lines=txt.split(/\r?\n/).filter(x=>x.trim()); let delim=lines[0].includes('\t')?'\t':','; let rows=lines.map(l=>delim=='\t'?l.split('\t'):parseCSVLine(l)); let header=rows.shift().map(h=>h.trim().toLowerCase()); return rows.map(r=>{let o={}; header.forEach((h,i)=>o[h]=String(r[i]??'').trim()); return o;});}
function normalizeRow(o,target){let lower={}; Object.keys(o).forEach(k=>lower[k.trim().toLowerCase()]=o[k]); let get=(...keys)=>{for(const k of keys){if(lower[k]!=null && lower[k]!=='')return lower[k]} return ''}; if(target=='FG') return {sku:get('sku','code','item code','รหัส','รหัสสินค้า'),name:get('name','item name','ชื่อ','ชื่อสินค้า')||get('sku'),product:get('product','กลุ่มสินค้า','category')||'Other',variant:get('variant','flavour','flavor','รสชาติ'),weight:get('weight','size','ขนาด'),unit:get('unit','หน่วย')||'pcs',stock:+get('stock','current stock','คงคลัง')||0,price:+get('price','selling price','ราคาขาย')||0,cost:+get('cost','ต้นทุน')||0,min:+get('min','min stock','ขั้นต่ำ')||0,max:+get('max','max stock','สูงสุด')||0,type:'FG'};
 if(target=='RM') return {sku:get('sku','rm code','code','รหัส','รหัสวัตถุดิบ'),name:get('name','rm name','ชื่อ','ชื่อวัตถุดิบ')||get('sku'),product:get('product','category','กลุ่ม')||'Raw Material',variant:get('variant','group','กลุ่มย่อย'),unit:get('unit','หน่วย')||'g',stock:+get('stock','current stock','คงคลัง')||0,cost:+get('cost','unit cost','ต้นทุน')||0,min:+get('min','min stock','ขั้นต่ำ')||0,max:+get('max','max stock','สูงสุด')||0};
 return {};}
function masterData(m){let target=$('mdTarget')?.value||'FG'; let q=$('mdq')?.value||''; let arr=target=='FG'?db.items:db.rm; let visible=arr.filter(x=>(x.sku+' '+x.name+' '+(x.product||'')+' '+(x.variant||'')+' '+(x.unit||'')).toLowerCase().includes(q.toLowerCase()));
 m.innerHTML=head('Master Data','เพิ่มสินค้า/วัตถุดิบเร็ว ๆ ด้วย Paste จาก Excel, Import CSV, Bulk Edit, Export Template')+
 `<div class="toolbar"><div class="row3"><select id="mdTarget" onchange="masterData($('main'))"><option value="FG" ${target=='FG'?'selected':''}>สินค้า / Finished Goods</option><option value="RM" ${target=='RM'?'selected':''}>วัตถุดิบ / Raw Material</option></select><input id="mdq" value="${escHTML(q)}" oninput="rerenderKeepFocus(()=>masterData($('main')))" placeholder="Search SKU / ชื่อ / Product / กลุ่ม"><button class="primary" onclick="openPasteImport()">Paste from Excel</button></div><div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap"><button class="ghost" onclick="exportTemplate()">Export Template CSV</button><button class="ghost" onclick="exportMaster()">Export Data CSV</button><button class="ghost" onclick="$('mdFile').click()">Import CSV</button><input id="mdFile" type="file" accept=".csv,.txt" style="display:none" onchange="importCSVFile(event)"><button class="ghost" onclick="openBulkEdit()">Bulk Edit รายการที่ติ๊ก</button><button class="ghost danger" onclick="bulkDeleteMaster()">ลบรายการที่ติ๊ก</button></div></div>`+
 `<div class="box"><div class="mini">Tip: Copy ตารางจาก Excel แล้วกด Paste from Excel ได้เลย คอลัมน์ที่รองรับ: SKU, Name, Product/Category, Variant, Weight, Unit, Stock, Price, Cost, Min, Max</div><br>${masterTable(visible,target)}</div>`;}
function masterTable(list,target){if(!list.length)return '<p class="hint">ไม่มีข้อมูล</p>'; return `<table id="mdTable"><tr><th style="width:110px"><label style="display:flex;gap:6px;align-items:center"><input type="checkbox" onchange="toggleAllMaster(this.checked)" style="width:22px;height:22px"> เลือกทั้งหมด</label></th><th>SKU</th><th>ชื่อ</th><th>${target=='FG'?'Product':'กลุ่ม'}</th><th>Variant</th><th>Unit/Size</th><th>Stock</th><th>Min</th><th>Cost/Price</th><th></th></tr>${list.map(x=>`<tr><td><input type="checkbox" class="mdChk" data-sku="${escHTML(x.sku)}" style="width:22px;height:22px"></td><td><b>${escHTML(x.sku)}</b></td><td>${escHTML(x.name)}</td><td>${escHTML(x.product||'')}</td><td>${escHTML(x.variant||'')}</td><td>${escHTML(x.unit||x.weight||'')}</td><td>${x.stock||0}</td><td>${x.min||0}</td><td>${target=='FG'?'฿'+(+x.price||0):'฿'+(+x.cost||0)}</td><td><button class="small" onclick="${target=='FG'?'editItem':'editRM'}('${escHTML(x.sku)}')">แก้ไข</button></td></tr>`).join('')}</table>`}

function openPasteImport(){let target=$('mdTarget')?.value||'FG'; modal(`<h2>Paste from Excel - ${target=='FG'?'สินค้า':'วัตถุดิบ'}</h2><p class="hint">Copy ตารางจาก Excel รวม Header แล้ววางในช่องนี้</p><textarea id="pasteBox" rows="12" placeholder="SKU\tName\tProduct\tUnit\tStock\tMin\nPS-SS-100\tProtein Stick...\tProtein Stick\tpcs\t0\t5"></textarea><br><br><button class="primary" onclick="previewImport('${target}')">Preview</button> <button class="ghost" onclick="$('modal').style.display='none'">ปิด</button><div id="importPreview" style="margin-top:16px"></div>`)}
function previewImport(target){let rows=parseTableText($('pasteBox').value).map(o=>normalizeRow(o,target)).filter(x=>x.sku); showImportPreview(rows,target);}
function showImportPreview(rows,target){let arr=target=='FG'?db.items:db.rm; let html=`<h3>Preview ${rows.length} รายการ</h3><table><tr><th>SKU</th><th>ชื่อ</th><th>Status</th></tr>${rows.slice(0,80).map(r=>{let ex=arr.some(x=>String(x.sku).toLowerCase()==String(r.sku).toLowerCase());return `<tr><td><b>${escHTML(r.sku)}</b></td><td>${escHTML(r.name)}</td><td>${ex?'⚠ Update Existing':'✅ New'}</td></tr>`}).join('')}</table>${rows.length>80?'<p class="hint">แสดง 80 รายการแรก</p>':''}<br><button class="primary" onclick='commitImport(${JSON.stringify(target)}, ${JSON.stringify(rows).replace(/'/g,"&#39;")})'>Import / Update</button>`; $('importPreview').innerHTML=html;}
function commitImport(target, rows){let arr=target=='FG'?db.items:db.rm; let n=0,u=0, changed=[]; rows.forEach(r=>{if(!r.sku)return; let ex=arr.find(x=>String(x.sku).toLowerCase()==String(r.sku).toLowerCase()); if(ex){Object.assign(ex,r,{stock:(+r.stock||0) || (+ex.stock||0)}); changed.push(ex); u++;} else {arr.push(r); changed.push(r); n++;}}); saveLocalOnly(); $('modal').style.display='none'; render(); changed.forEach(x=>target=='FG'?saveProductDirect(x):saveRawMaterialDirect(x)); toast(`Import แล้ว New ${n} / Update ${u} / ส่งเข้า Google Sheet`);}
function importCSVFile(e){let f=e.target.files[0]; if(!f)return; let target=$('mdTarget')?.value||'FG'; let r=new FileReader(); r.onload=()=>{let rows=parseTableText(r.result).map(o=>normalizeRow(o,target)).filter(x=>x.sku); modal(`<h2>Import CSV Preview</h2><div id="importPreview"></div>`); showImportPreview(rows,target);}; r.readAsText(f);}
function exportTemplate(){let target=$('mdTarget')?.value||'FG'; let h=target=='FG'?['SKU','Name','Product','Variant','Weight','Unit','Stock','Price','Cost','Min','Max']:['SKU','Name','Category','Variant','Unit','Stock','Cost','Min','Max']; downloadText((target=='FG'?'product':'raw_material')+'_template.csv', h.join(',')+'\n');}
function exportMaster(){let target=$('mdTarget')?.value||'FG'; let arr=target=='FG'?db.items:db.rm; let h=target=='FG'?['SKU','Name','Product','Variant','Weight','Unit','Stock','Price','Cost','Min','Max']:['SKU','Name','Category','Variant','Unit','Stock','Cost','Min','Max']; let body=arr.map(x=> target=='FG'?[x.sku,x.name,x.product,x.variant,x.weight,x.unit,x.stock,x.price,x.cost,x.min,x.max]:[x.sku,x.name,x.product,x.variant,x.unit,x.stock,x.cost,x.min,x.max]).map(r=>r.map(csvEscape).join(',')).join('\n'); downloadText((target=='FG'?'products':'raw_material')+'_export.csv', h.join(',')+'\n'+body);}

function openBulkEdit(){let target=$('mdTarget')?.value||'FG'; let skus=selectedMasterSkus(); if(!skus.length)return toast('ติ๊กรายการก่อน'); modal(`<h2>Bulk Edit ${skus.length} รายการ</h2><p class="hint">ใส่เฉพาะช่องที่ต้องการเปลี่ยน ถ้าเว้นว่างจะไม่แก้</p><div class="row2"><input id="be_product" placeholder="Product / กลุ่ม"><input id="be_variant" placeholder="Variant"><input id="be_unit" placeholder="Unit"><input id="be_min" type="number" placeholder="Min Stock"></div><br><button class="primary" onclick="applyBulkEdit('${target}', '${skus.join('|')}')">Apply</button> <button class="ghost" onclick="$('modal').style.display='none'">ปิด</button>`)}
function applyBulkEdit(target, joined){let arr=target=='FG'?db.items:db.rm; let set=new Set(joined.split('|')), changed=[]; arr.forEach(x=>{if(!set.has(x.sku))return; if(be_product.value)x.product=be_product.value; if(be_variant.value)x.variant=be_variant.value; if(be_unit.value)x.unit=be_unit.value; if(be_min.value!=='')x.min=+be_min.value; changed.push(x);}); saveLocalOnly(); $('modal').style.display='none'; render(); changed.forEach(x=>target=='FG'?saveProductDirect(x):saveRawMaterialDirect(x)); toast('Bulk Edit แล้ว / ส่งเข้า Google Sheet')}

function prodSummarySourceLabel(r){
  const s=String(r.source||r.Source||'').toLowerCase();
  if(s.includes('erp-manual') || s.includes('production record')) return 'บันทึกผลผลิต ERP';
  if(s.includes('google') || s.includes('csv') || s.includes('uploaded') || s.includes('paste') || s.includes('form')) return 'QR / Google Form';
  return 'QR / Google Form';
}
function prodSummaryItemInfo(sku, fallbackProduct='', fallbackVariant=''){
  const it=(db.items||[]).find(x=>String(x.sku)==String(sku))||{};

    name: it.name||'',
    product: it.product||fallbackProduct||'-',
    variant: it.variant||fallbackVariant||it.weight||'-'
  };
}

}

/* ===== v9.6 Production Summary Stable: รวมจาก PO + ProductionLog + StockMovement หลัง Refresh ===== */
function productionSummaryMoveSource(m){
  const src=String(m.source||m.Source||'').toLowerCase();
  const ref=String(m.ref||m.Ref||'');
  const rem=String(m.remark||m.Remark||'').toLowerCase();
  if(src.includes('produce') || src.includes('erp-manual') || rem.includes('production record')) return 'บันทึกผลผลิต ERP';
  if(src.includes('google') || src.includes('form') || src.includes('csv') || ref.includes('GS-') || ref.includes('FGP-')) return 'QR / Google Form';
  return 'บันทึกผลผลิต ERP';
}
function productionSummaryAllRows(){
  const out=[];
  const poRefs=new Set();
  const logRefs=new Set();
  (db.po||[]).forEach(p=>{
    if(String(p.status||'').toLowerCase()!=='completed') return;
    const sku=String(p.sku||p.SKU||'');
    const info=prodSummaryItemInfo(sku);
    const ref=p.id||p.PO||'';
    if(ref) poRefs.add(String(ref));
    out.push({date:dateISO(p.finish||p.FinishAt||p.time||p.CreatedAt||''),timestamp:p.finish||p.FinishAt||p.time||p.CreatedAt||'',source:'คำสั่งผลิต ERP',ref,sku,name:info.name,product:info.product,variant:info.variant,qty:+p.qty||+p.Qty||0});
  });
  (db.prodLog||[]).forEach(r=>{
    const status=String(r.status||r.Status||'Active').toLowerCase();
    if(status==='voided' || status==='cancelled') return;
    const sku=String(r.sku||r.SKU||'');
    const info=prodSummaryItemInfo(sku, r.product||r.Product||'', r.variant||r.Variant||'');
    const ref=r.id||r.LogID||'';
    if(ref) logRefs.add(String(ref));
    out.push({date:dateISO(r.timestamp||r.Timestamp||r.mfgDate||r.MfgDate||''),timestamp:r.timestamp||r.Timestamp||r.mfgDate||r.MfgDate||'',source:prodSummarySourceLabel(r),ref,sku,name:info.name,product:info.product,variant:info.variant,qty:+r.qty||+r.Qty||0});
  });
  // สำรองสำคัญ: หลัง Refresh บางแหล่งอาจเหลือใน StockMovement แต่ไม่อยู่ใน ProductionLog
  // ให้ดึง FG IN จาก StockMovement เฉพาะที่ไม่ซ้ำกับ PO / ProductionLog
  (db.mov||[]).forEach(m=>{
    const type=String(m.type||m.ItemType||'').toUpperCase();
    const mode=String(m.mode||m.Mode||'').toUpperCase();
    const ref=String(m.ref||m.Ref||'');
    const qty=+m.qty||+m.Qty||0;
    const src=String(m.source||m.Source||'').toLowerCase();
    if(type!=='FG') return;
    if(qty<=0) return;
    if(['OUT','ADJ_OUT','SCRAP','ISSUE','CYCLE_COUNT'].includes(mode)) return;
    if(ref && (poRefs.has(ref) || logRefs.has(ref))) return;
    if(ref.startsWith('VOID-') || src.includes('void')) return;
    const sku=String(m.sku||m.SKU||'');
    const info=prodSummaryItemInfo(sku);
    out.push({date:dateISO(m.time||m.Timestamp||''),timestamp:m.time||m.Timestamp||'',source:productionSummaryMoveSource(m),ref,sku,name:info.name,product:info.product,variant:info.variant,qty});
  });
  return out.filter(x=>x.sku && x.qty>0);
}
function productionSummaryPage(m){
  const today=todayISO();
  const start=$('sumStart')?.value||today;
  const end=$('sumEnd')?.value||today;
  const sourceFilter=$('sumSource')?.value||'';
  const rows=productionSummaryAllRows().filter(r=>{
    const d=r.date||dateISO(r.timestamp||'');
    if(start && d && d<start) return false;
    if(end && d && d>end) return false;
    if(!matchesProdFilter('prodsummary',r.product)) return false;
    if(sourceFilter && r.source!==sourceFilter) return false;
    return true;
  });
  const map={};
  rows.forEach(r=>{
    const key=r.product+'||'+r.variant;
    if(!map[key]) map[key]={product:r.product,variant:r.variant,qty:0,po:0,qr:0,manual:0,skuCount:new Set(),rows:0};
    map[key].qty += +r.qty||0;
    if(r.source==='คำสั่งผลิต ERP') map[key].po += +r.qty||0;
    else if(r.source==='บันทึกผลผลิต ERP') map[key].manual += +r.qty||0;
    else map[key].qr += +r.qty||0;
    map[key].skuCount.add(r.sku); map[key].rows += 1;
  });
  const summary=Object.values(map).sort((a,b)=>b.qty-a.qty || String(a.product).localeCompare(String(b.product)));
  const totalQty=summary.reduce((a,x)=>a+x.qty,0);
  const totalPO=rows.filter(x=>x.source==='คำสั่งผลิต ERP').reduce((a,x)=>a+x.qty,0);
  const totalQR=rows.filter(x=>x.source==='QR / Google Form').reduce((a,x)=>a+x.qty,0);
  const totalManual=rows.filter(x=>x.source==='บันทึกผลผลิต ERP').reduce((a,x)=>a+x.qty,0);
  m.innerHTML=head('สรุปผลผลิต','รวมจาก 1) คำสั่งผลิต ERP 2) QR ที่พนักงานสแกน 3) บันทึกผลผลิตจาก ERP')+
  `<div class="toolbar"><div class="row3"><input id="sumStart" type="date" value="${start}" onchange="productionSummaryPage($('main'))"><input id="sumEnd" type="date" value="${end}" onchange="productionSummaryPage($('main'))"><select id="sumSource" onchange="productionSummaryPage($('main'))"><option value="">ทุกแหล่งที่มา</option><option ${sourceFilter==='คำสั่งผลิต ERP'?'selected':''}>คำสั่งผลิต ERP</option><option ${sourceFilter==='QR / Google Form'?'selected':''}>QR / Google Form</option><option ${sourceFilter==='บันทึกผลผลิต ERP'?'selected':''}>บันทึกผลผลิต ERP</option></select></div>${productChipsHTML('prodsummary','productionSummaryPage')}<button class="ghost" onclick="loadFromGoogleSheet()">Refresh จาก Google Sheet</button></div>`+
  `<div class="kpis"><div class="kpi">ผลิตรวม<b>${totalQty}</b></div><div class="kpi">จากคำสั่งผลิต ERP<b>${totalPO}</b></div><div class="kpi">จาก QR Scan<b>${useTodayCache(start)&&start===end?dashboardValue('PROD_QR_TODAY',totalQR):totalQR}</b></div><div class="kpi">จากบันทึกผลผลิต ERP<b>${useTodayCache(start)&&start===end?dashboardValue('PROD_MANUAL_TODAY',totalManual):totalManual}</b></div></div>`+
  `<div class="box"><h2>สรุปตาม Product / Variant</h2>${productionSummaryTable(summary,totalQty)}</div>`+
  `<div class="box"><h2>รายละเอียด SKU + แหล่งที่มา</h2>${productionSkuSummaryTable(rows)}</div>`+
  `<div class="box"><h2>รายการล่าสุด</h2>${productionSummaryRawTable(rows.slice().sort((a,b)=>String(b.timestamp).localeCompare(String(a.timestamp))).slice(0,80))}</div>`;
  applyViewerUI?.();
}



/* === v9.13 stability overrides: refresh merge + fast cycle/void === */
function erpKeyVal(o, keys){ for(const k of keys){ if(o && o[k]!==undefined && o[k]!==null && String(o[k])!=='') return String(o[k]); } return ''; }
function erpMergeByKey(localArr, remoteArr, keys){
  const map=new Map();
  (localArr||[]).forEach(o=>{const k=erpKeyVal(o,keys); if(k) map.set(k,o);});
  (remoteArr||[]).forEach(o=>{const k=erpKeyVal(o,keys); if(k) map.set(k,{...(map.get(k)||{}),...o});});
  return Array.from(map.values());
}
function erpMergeByFn(localArr, remoteArr, keyFn){
  const map=new Map();
  (localArr||[]).forEach(o=>{const k=keyFn(o); if(k) map.set(k,o);});
  (remoteArr||[]).forEach(o=>{const k=keyFn(o); if(k) map.set(k,{...(map.get(k)||{}),...o});});
  return Array.from(map.values());
}

function saveCycleCount(){
  let type=$('ctype')?.value||'FG', reason=$('creason')?.value||'Cycle Count', remark=$('cremark')?.value||'';
  let rows=[...document.querySelectorAll('.cycleChk:checked')].map(c=>{let sku=c.dataset.sku, v=$('ccount_'+sku)?.value; return {sku,counted:v===''?null:+v};}).filter(x=>x.counted!==null && x.counted>=0);
  if(!rows.length)return toast('ติ๊ก SKU และใส่ยอดนับจริงก่อน');
  let ref='CC-'+Date.now(); const pairs=[];
  rows.forEach(r=>{
    let arr=type=='RM'?db.rm:db.items, it=arr.find(x=>x.sku==r.sku); if(!it)return;
    let before=+it.stock||0, diff=r.counted-before; it.stock=r.counted;
    let rec={id:'MV-'+Date.now()+'-'+Math.floor(Math.random()*9999),time:now(),type,sku:r.sku,mode:'CYCLE_COUNT',qty:diff,ref,remark:`${reason}${remark?' - '+remark:''} | Before ${before} → After ${r.counted}`,stock:it.stock,synced:false,source:'ERP-CYCLE-v9.13'};
    db.mov.push(rec);
    pairs.push({
      mov:{MoveID:rec.id,Timestamp:rec.time,ItemType:type,SKU:r.sku,Mode:'CYCLE_COUNT',Qty:diff,Ref:ref,Remark:rec.remark,StockAfter:r.counted,Source:'ERP-CYCLE-v9.13'},
      cycle:{CountID:rec.id,Timestamp:rec.time,ItemType:type,SKU:r.sku,SystemQty:before,CountQty:r.counted,Diff:diff,Remark:rec.remark},
      moveId:rec.id
    });
  });
  saveLocalOnly(); render(); toast('กำลังบันทึก Cycle Count แบบเร็ว...');
  // v9.48 fix: เดิมแบ่งเป็นชุดคงที่ 15 SKU ยังไม่พอถ้า Remark เป็นภาษาไทยยาวๆ (encode URL แล้วยาวขึ้น
  // 2-3 เท่า) ตอนนี้วัดขนาดจริงหลัง encode ก่อนแบ่งชุด ปลอดภัยไม่ว่าข้อความจะสั้นหรือยาวแค่ไหน
  (async()=>{
    let savedCount=0;
    try{
      const chunks=chunkItemsBySize_(pairs, chunk=>({action:'cycletransaction',data:{movements:chunk.map(p=>p.mov),cycles:chunk.map(p=>p.cycle)}}));
      for(const chunk of chunks){
        await apiPost({action:'cycletransaction',data:{movements:chunk.map(p=>p.mov),cycles:chunk.map(p=>p.cycle)}});
        chunk.forEach(p=>{let x=db.mov.find(v=>v.id===p.moveId); if(x)x.synced=true;});
        savedCount+=chunk.length;
        saveLocalOnly();
      }
      sheetDone('Cycle Count เข้า Google Sheet แล้ว ('+pairs.length+' SKU)');
    }catch(e){
      console.error(e);
      const statusMsg=savedCount===0
        ? 'ยังไม่มีรายการไหนบันทึกสำเร็จเลยสักตัว (0/'+pairs.length+')'
        : 'บันทึกสำเร็จไปแล้ว '+savedCount+' จาก '+pairs.length+' รายการ ส่วนที่เหลือยังไม่สำเร็จ';
      alert('Cycle Count: '+statusMsg+'\n\nสาเหตุ: '+(e.message||e)+'\n\nลองกด "บันทึก Cycle Count" ซ้ำได้เลย ระบบจะคำนวณผลต่างใหม่จากสต๊อกล่าสุด ตัวที่บันทึกสำเร็จไปแล้วจะไม่ถูกปรับซ้ำอีก (ผลต่างกลายเป็น 0 แล้ว) ไม่ต้องกังวลเรื่องข้อมูลซ้ำ');
    }
  })();
}
async function voidProductionTransaction(logId,reason){
  if(!logId)return;
  toast('กำลัง Void แบบเร็ว...');
  const r=(db.prodLog||[]).find(x=>String(x.id||x.LogID||'')===String(logId));
  try{
    await apiPost({action:'voidproductionfast',logId,reason,voidBy:'ERP User'});
    if(r){
      r.status='Voided'; r.Status='Voided'; r.voidReason=reason; r.VoidReason=reason; r.voidAt=now(); r.VoidAt=now();
      // v9.39 fix: เดิมโหลดข้อมูลทั้งหมดใหม่ทุกครั้งหลัง Void (ช้ามาก) ตอนนี้คำนวณ reverse Stock ในเครื่อง
      // ทันที (ลด FG คืน RM ตาม BOM) เหมือนที่ Server ทำเป๊ะๆ ไม่ต้องรอโหลดใหม่ทั้งหมด ข้อมูลจริงจะ
      // sync ครบอีกทีตอนกด Refresh ปกติหรือเปลี่ยนหน้าไปมา
      const sku=String(r.sku||r.SKU||''), qty=+(r.qty||r.Qty||0);
      if(sku && qty){
        const it=(db.items||[]).find(x=>String(x.sku)===sku);
        if(it) it.stock=(+it.stock||0)-qty;
        (db.bom?.[sku]||[]).forEach(b=>{
          const rmItem=(db.rm||[]).find(x=>String(x.sku)===String(b.sku));
          if(rmItem) rmItem.stock=(+rmItem.stock||0)+qty*(+b.qty||0);
        });
      }
    }
    saveLocalOnly(); page='trx'; render();
    sheetDone('Void สำเร็จ / Stock อัปเดตแล้ว');
  }catch(e){
    // เชื่อมต่อมีปัญหาจริง ไม่รู้ผลชัวร์ ต้องโหลดใหม่ทั้งหมดเพื่อเช็คสถานะจริง (กรณีนี้เท่านั้นถึงจะช้า)
    try{ await loadFromGoogleSheet(); page='trx'; render(); }catch(e2){ console.error('refresh after void failed', e2); }
    alert('การเชื่อมต่อตอน Void มีปัญหา (Server มักทำงานเสร็จจริงแล้ว): '+(e.message||e)+'\n\nระบบโหลดข้อมูลล่าสุดให้แล้ว เช็คในตารางว่า Void สำเร็จหรือยัง');
  }
}

/* === v9.14 login screen: รหัสผ่านเดียวใช้ร่วมกันทั้งร้าน ผูกกับ API Key เดิม === */
function showLoginScreen(msg){
  document.body.classList.add('login-locked');
  const scr=$('loginScreen'); if(scr) scr.style.display='flex';
  const err=$('loginError'); if(err) err.textContent=msg||'';
  setTimeout(()=>{const el=$('loginPw'); if(el) el.focus();},50);
}
function hideLoginScreen(){
  document.body.classList.remove('login-locked');
  const scr=$('loginScreen'); if(scr) scr.style.display='none';
}
async function doLogin(){
  const pwEl=$('loginPw');
  const pw=(pwEl&&pwEl.value||'').trim();
  const errEl=$('loginError');
  if(!pw){ if(errEl) errEl.textContent='กรุณากรอกรหัสผ่าน'; return; }
  const btn=document.querySelector('#loginScreen button.primary');
  if(btn){btn.disabled=true;btn.textContent='กำลังตรวจสอบ...';}
  if(errEl) errEl.textContent='';
  const prevKey=apiKey;
  apiKey=pw;
  try{
    await apiGet('ping'); // ยิงไปเช็คกับ Apps Script จริง ผ่าน checkAuth_ ฝั่งเซิร์ฟเวอร์
    localStorage.setItem('bakery_api_key',apiKey);
    localStorage.setItem('bakery_logged_in','1');
    hideLoginScreen();
    startApp();
  }catch(e){
    apiKey=prevKey;
    if(errEl) errEl.textContent='รหัสผ่านไม่ถูกต้อง หรือเชื่อมต่อ API ไม่ได้: '+(e.message||e);
  }finally{
    if(btn){btn.disabled=false;btn.textContent='เข้าสู่ระบบ';}
  }
}
function logout(){
  if(!confirm('ออกจากระบบ?')) return;
  localStorage.removeItem('bakery_api_key');
  localStorage.removeItem('bakery_logged_in');
  location.reload();
}
function startApp(){
  if(VIEWER_ONLY) installViewerGuards();
  render();
  setupAutoCsvSync();
  setTimeout(()=>{ if(apiUrl) loadFromGoogleSheet(); },300);
}
if(localStorage.getItem('bakery_logged_in')==='1' && apiKey){
  startApp();
}else{
  showLoginScreen();
}
