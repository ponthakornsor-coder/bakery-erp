function apiGet(action='all', params={}){
  if(!apiUrl) return Promise.reject(new Error('ยังไม่ได้ใส่ API URL'));
  const cb='jsonp_'+Date.now()+'_'+Math.floor(Math.random()*9999);
  const url=new URL(apiUrl);
  url.searchParams.set('action',action); url.searchParams.set('callback',cb);
  Object.entries(params||{}).forEach(([k,v])=>url.searchParams.set(k,v));
  return new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    const timer=setTimeout(()=>{cleanup();reject(new Error('API timeout'))},60000);
    function cleanup(){clearTimeout(timer); delete window[cb]; s.remove();}
    window[cb]=data=>{cleanup(); data&&data.ok?resolve(data):reject(new Error(data?.error||'API error'))};
    s.onerror=()=>{cleanup();reject(new Error('โหลด API ไม่ได้'))};
    s.src=url.toString(); document.body.appendChild(s);
  });
}
async function apiPost(body){
  // ใช้ JSONP GET สำหรับการเขียนข้อมูล เพราะเปิดจากไฟล์ HTML (file://) แล้ว POST/no-cors ตรวจสอบยาก
  // วิธีนี้จะทำให้ Apps Script มี Execution ทุกครั้ง และเขียนลง Google Sheet ได้ชัดเจน
  if(!apiUrl) throw new Error('ยังไม่ได้ใส่ API URL');
  return apiGet('write',{payload:JSON.stringify(body)});
}

async function pushMovementsOnly(movements, silent=true){
  const list=(movements||[]).filter(x=>x && !x.synced);
  if(!list.length) return;
  const payload=list.map(m=>{
    const q=(String(m.mode).toUpperCase()==='CYCLE_COUNT')?(+m.qty||0):Math.abs(+m.qty||0);
    return {MoveID:m.id,Timestamp:m.time,ItemType:m.type,SKU:m.sku,Mode:m.mode,Qty:q,Ref:m.ref||'',Remark:m.remark||'',StockAfter:m.stock||'',Source:'ERP-v8.3-BATCH'};
  });
  try{
    await apiPost({action:'movementbatch',data:payload});
    list.forEach(m=>m.synced=true);
  }catch(e){
    // fallback สำหรับ Apps Script รุ่นเก่า
    for(let i=0;i<list.length;i++){
      const m=list[i], d=payload[i];
      await apiPost({action:'movement',data:d});
      m.synced=true;
    }
  }
  saveLocalOnly();
  if(!silent) sheetDone('บันทึก Movement เข้า Google Sheet เรียบร้อยแล้ว');
}
function sendNewMovementsSince(index){
  const newMov=(db.mov||[]).slice(index).filter(x=>!x.synced);
  if(!newMov.length) return;
  pushMovementsOnly(newMov,true).then(()=>sheetDone('StockMovement เข้า Google Sheet เรียบร้อยแล้ว')).catch(e=>{console.error(e); alert('StockMovement ไม่เข้า Google Sheet: '+(e.message||e));});
}

function toastSaveOK(name){toast(name+' เข้า Google Sheet แล้ว')}
function toastSaveFail(name,e){console.error(e); alert(name+' ไม่เข้า Google Sheet: '+(e.message||e));}
function fgPayload(x){return {SKU:x.sku,Name:x.name,Product:x.product||'',Variant:x.variant||'',Weight:x.weight||'',Unit:x.unit||'pcs',Stock:+x.stock||0,Min:+x.min||0,Price:+x.price||0,Cost:+x.cost||0,Status:'Active'};}
function rmPayload(r){return {RMCode:r.sku,Name:r.name,Category:r.product||'Raw Material',Variant:r.variant||'',Unit:r.unit||'g',Stock:+r.stock||0,Min:+r.min||0,Cost:+r.cost||0,Status:'Active'};}
function poPayload(p){return {PO:p.id,SKU:p.sku,Qty:+p.qty||0,Status:p.status||'Open',CreatedAt:p.time||'',StartAt:p.start||'',FinishAt:p.finish||'',Remark:p.remark||'',UpdatedAt:now()};}
function orderPayload(o){return {OrderNo:'DAY-'+o.date,OrderDate:o.date,TotalOrders:+o.total||0,CompletedOrders:+o.shipped||0,Status:(+o.shipped>=+o.total?'Completed':'Pending'),Remark:o.note||''};}
function orderItemPayload(date,s){return {OrderNo:'DAY-'+date+'-'+s.sku,SKU:s.sku,Qty:+s.qty||0,CompletedQty:0,ShortQty:+s.qty||0,Reason:s.reason||'',UpdatedAt:now()};}
function cyclePayload(rec,before,counted){return {CountID:rec.id,Timestamp:rec.time,ItemType:rec.type,SKU:rec.sku,SystemQty:before,CountQty:counted,Diff:rec.qty,Remark:rec.remark||'',UpdatedAt:now()};}
function upsertSheet(sheet,key,data,label){return apiPost({action:'upsert',sheet,key,data}).then(()=>toastSaveOK(label)).catch(e=>toastSaveFail(label,e));}
function upsertSheetBatch(sheet,key,rows,label){return apiPost({action:'upsertbatch',sheet,key,rows}).then(()=>sheetDone((label||sheet)+' เข้า Google Sheet ครบ '+(rows||[]).length+' รายการแล้ว')).catch(e=>toastSaveFail(label||sheet,e));}
function deleteSheet(sheet,key,value,label){return apiPost({action:'delete',sheet,key,value}).then(()=>toastSaveOK(label)).catch(e=>toastSaveFail(label,e));}
function saveProductDirect(x){if(!x||!x.sku)return; return upsertSheet('ProductMaster','SKU',fgPayload(x),'ProductMaster');}
function saveRawMaterialDirect(r){if(!r||!r.sku)return; return upsertSheet('RawMaterial','RMCode',rmPayload(r),'RawMaterial');}

function savePODirect(p){if(!p||!p.id)return; return upsertSheet('ProductionOrder','PO',poPayload(p),'ProductionOrder');}
function savePOBatchDirect(list){list=(list||[]).filter(p=>p&&p.id); if(!list.length)return Promise.resolve(); return apiPost({action:'upsertbatch',sheet:'ProductionOrder',key:'PO',rows:list.map(poPayload)}).then(()=>sheetDone('ProductionOrder เข้า Google Sheet ครบ '+list.length+' รายการแล้ว'));}
function saveProductionBatchDirect(list){list=(list||[]).filter(x=>x&&x.SKU&&(+x.Qty||0)>0); if(!list.length)return Promise.resolve(); return apiPost({action:'producebatch',data:list}).then(()=>sheetDone('บันทึกผลผลิตเข้า Google Sheet ครบ '+list.length+' รายการ และตัด BOM แล้ว'));}
function saveOrderDirect(o){if(!o||!o.date)return; return upsertSheet('Orders','OrderNo',orderPayload(o),'Orders');}
function saveOrderItemDirect(date,s){if(!s||!s.sku)return; return upsertSheet('OrderItems','OrderNo',orderItemPayload(date,s),'OrderItems');}
function saveCycleDirect(rec,before,counted){return upsertSheet('CycleCount','CountID',cyclePayload(rec,before,counted),'CycleCount');}
function saveCycleBatchDirect(list){
  const rows=(list||[]).map(x=>cyclePayload(x.rec,x.before,x.counted));
  if(!rows.length) return Promise.resolve();
  return apiPost({action:'cyclebatch',data:rows}).then(()=>toastSaveOK('CycleCount')).catch(e=>{
    // fallback รุ่นเก่า: ส่งทีละรายการ
    rows.reduce((p,r)=>p.then(()=>upsertSheet('CycleCount','CountID',r,'CycleCount')),Promise.resolve()).catch(err=>toastSaveFail('CycleCount',err));
  });

function fromSheetData(data){
  const items=(data.products||[]).map(p=>({sku:String(p.SKU||''),name:p.Name||'',product:p.Product||'',variant:p.Variant||'',weight:p.Weight||'',unit:p.Unit||'pcs',stock:+p.Stock||0,min:+p.Min||0,price:+p.Price||0,cost:+p.Cost||0,type:'FG'})).filter(x=>x.sku);
  const rm=(data.rawMaterials||[]).map(r=>({sku:String(r.RMCode||''),name:r.Name||'',product:r.Category||'Raw Material',variant:r.Variant||'',unit:r.Unit||'g',stock:+r.Stock||0,min:+r.Min||0,cost:+r.Cost||0})).filter(x=>x.sku);
  const bom={}; (data.bom||[]).forEach(b=>{ if(!b.SKU||!b.RMCode)return; bom[b.SKU]=bom[b.SKU]||[]; bom[b.SKU].push({sku:b.RMCode,qty:+b.QtyPerUnit||0,unit:b.Unit||''}); });
  const prodLog=(data.productionLog||[]).map(r=>({id:r.LogID||'',timestamp:r.Timestamp||'',sku:r.SKU||'',product:r.Product||'',qty:+r.Qty||0,expiry:r.ExpiryDate||'',operator:r.Operator||'',remark:r.Remark||'',photo:r.Photo||'',source:r.Source||'Google Sheet',status:r.Status||'Active',voidReason:r.VoidReason||'',voidAt:r.VoidAt||''}));
  const mov=(data.stockMovement||[]).map(r=>({id:r.MoveID||'',time:r.Timestamp||'',type:r.ItemType||'',sku:r.SKU||'',mode:r.Mode||'',qty:+r.Qty||0,ref:r.Ref||'',remark:r.Remark||'',stock:+r.StockAfter||0,source:r.Source||'',status:r.Status||'Active',synced:true}));
  const orderDays=(data.orders||[]).map(o=>({date:dateISO(o.OrderDate)||String(o.OrderDate||''),total:+o.TotalOrders||0,shipped:+o.CompletedOrders||0,note:o.Remark||'',shortages:[]}));
  db.items=items.length?items:db.items; db.rm=rm.length?rm:db.rm; db.bom=bom; db.prodLog=prodLog; db.mov=mov; db.orderDays=orderDays; db.dashboard=data.dashboard||[]; db.remote=db.remote||{}; db.remote.lastApiSync=now();
}
function dashboardValue(key, fallback=0){
  const r=(db.dashboard||[]).find(x=>String(x.Key)===String(key));
  if(!r) return fallback;
  const n=Number(r.Value);
  return isNaN(n)?(r.Value??fallback):n;
}
function useTodayCache(selDate){return selDate===todayISO() && (db.dashboard||[]).length>0;}
async function loadFromGoogleSheet(){
  if(apiBusy)return; apiBusy=true; toast('กำลังโหลดข้อมูลจาก Google Sheet...');
  try{const res=await apiGet('all'); fromSheetData(res.data||{}); saveLocalOnly(); render(); toast('โหลดข้อมูลจาก Google Sheet แล้ว');}
  catch(e){console.error(e); alert('โหลดไม่ได้: '+(e.message||e));}
  finally{apiBusy=false;}
}
async function pushToGoogleSheet(silent=false){
  if(apiBusy){
    if(!silent) toast('ระบบกำลัง Sync อยู่ รอสักครู่');
    else scheduleAutoPush();
    return;
  }
  apiBusy=true;
  if(!silent) toast('กำลังบันทึกขึ้น Google Sheet...');
  try{
    for(const x of db.items||[]) await apiPost({action:'upsert',sheet:'ProductMaster',key:'SKU',data:{SKU:x.sku,Name:x.name,Product:x.product,Variant:x.variant,Weight:x.weight,Unit:x.unit||'pcs',Stock:+x.stock||0,Min:+x.min||0,Price:+x.price||0,Cost:+x.cost||0,Status:'Active'}});
    for(const r of db.rm||[]) await apiPost({action:'upsert',sheet:'RawMaterial',key:'RMCode',data:{RMCode:r.sku,Name:r.name,Category:r.product||'Raw Material',Variant:r.variant,Unit:r.unit||'g',Stock:+r.stock||0,Min:+r.min||0,Cost:+r.cost||0,Status:'Active'}});
    for(const sku of Object.keys(db.bom||{})) await apiPost({action:'savebom',sku,lines:(db.bom[sku]||[]).map(l=>({RMCode:l.sku,QtyPerUnit:+l.qty||0,Unit:l.unit||'',Version:'1',Status:'Active'}))});
    for(const m of (db.mov||[]).filter(x=>!x.synced)) { const q=(String(m.mode).toUpperCase()==='CYCLE_COUNT')?(+m.qty||0):Math.abs(+m.qty||0); await apiPost({action:'movement',data:{MoveID:m.id,Timestamp:m.time,ItemType:m.type,SKU:m.sku,Mode:m.mode,Qty:q,Ref:m.ref||'',Remark:m.remark||'',StockAfter:m.stock||'',Source:'ERP-v8'}}); m.synced=true; }
    for(const p of db.po||[]) await apiPost({action:'upsert',sheet:'ProductionOrder',key:'PO',data:{PO:p.id,SKU:p.sku,Qty:+p.qty||0,Status:p.status||'Open',CreatedAt:p.time||'',StartAt:p.start||'',FinishAt:p.finish||'',Remark:p.remark||'',UpdatedAt:now()}});
    for(const o of db.orderDays||[]) await apiPost({action:'upsert',sheet:'Orders',key:'OrderNo',data:{OrderNo:'DAY-'+o.date,OrderDate:o.date,TotalOrders:+o.total||0,CompletedOrders:+o.shipped||0,Status:(+o.shipped>=+o.total?'Completed':'Pending'),Remark:o.note||''}});
    for(const o of db.orderDays||[]) for(const s of (o.shortages||[])) await apiPost({action:'upsert',sheet:'OrderItems',key:'OrderNo',data:{OrderNo:'DAY-'+o.date+'-'+s.sku,SKU:s.sku,Qty:+s.qty||0,CompletedQty:0,ShortQty:+s.qty||0,Reason:s.reason||'',UpdatedAt:now()}});
    db.remote=db.remote||{}; db.remote.lastPush=now(); saveLocalOnly(); if(!silent) render(); if(silent) toast('บันทึกอัตโนมัติขึ้น Google Sheet แล้ว'); else sheetDone('บันทึกขึ้น Google Sheet เรียบร้อยแล้ว');
  }catch(e){console.error(e); if(!silent) alert('บันทึกไม่ได้: '+(e.message||e)); else toast('Auto save ไม่สำเร็จ: '+(e.message||e));}
  finally{apiBusy=false;}
}
async function syncProdToSheet(){
  try{toast('กำลัง Sync Production Log ที่ Apps Script...'); await apiPost({action:'syncprod'}); await loadFromGoogleSheet();}
  catch(e){alert('Sync Production Log ไม่สำเร็จ: '+(e.message||e));}
}
function saveLocalOnly(){localStorage.setItem('bakery_erp_v6_1',JSON.stringify(db));}
function scheduleAutoPush(){
  if(!apiUrl) return;
  if(autoPushTimer) clearTimeout(autoPushTimer);
  autoPushTimer=setTimeout(()=>pushToGoogleSheet(true), AUTO_PUSH_DELAY_MS);
}


const EMBEDDED_FG_LOG = [{"id": "FG-1", "timestamp": "2026-06-28 14:56:20", "sku": "TEST", "product": "⭐ Special", "qty": 500.0, "expiry": "2026-09-28", "operator": "Rin", "remark": "WASTETEST", "photo": "https://drive.google.com/open?id=1d4AbHZrJ9JfdmSZ846wih6L6_mhOJiyj", "mfgDate": "28/06/2026", "mfgTime": "14:56:23", "day": "วันอาทิตย์", "source": "Uploaded Production Log"}];
let db=load(); let page='dashboard';
function load(){let d=localStorage.getItem('bakery_erp_v6_1'); if(d){let x=JSON.parse(d); x.remote=x.remote||{url:'',autoSync:false,lastSync:''}; x.orders=x.orders||[]; x.orderDays=x.orderDays||[]; x.orderSeq=x.orderSeq||1; x.po=x.po||[]; x.mov=x.mov||[]; x.prodLog=x.prodLog||[]; return x;} return {items:MASTER_SKUS,rm:DEFAULT_RM,bom:{},mov:[],po:[],seq:1,orders:[],orderDays:[],orderSeq:1,prodLog:EMBEDDED_FG_LOG.slice(),remote:{url:'',autoSync:false,lastSync:''}};}

function toast(t){$('toast').textContent=t;$('toast').style.display='block';setTimeout(()=>$('toast').style.display='none',2300)}
function sheetDone(t){
  toast(t);
  setTimeout(()=>alert(t),80);
}
function nav(){ $('nav').innerHTML=pages.map(p=>`<button class="${page==p[0]?'active':''}" onclick="go('${p[0]}')">${p[1]}</button>`).join('') } function go(p){page=p;render()}
function render(){try{nav(); const m=$('main'); if(page=='dashboard') return dash(m); if(page=='master') return masterData(m); if(page=='items') return items(m); if(page=='rm') return rm(m); if(page=='stock') return stock(m); if(page=='cycle') return cycleCount(m); if(page=='fglog') return fgLogPage(m); if(page=='prodrecord') return productionRecordPage(m); if(page=='trx') return transactionCenterPage(m); if(page=='prodsummary') return productionSummaryPage(m); if(page=='prod') return prod(m); if(page=='orders') return ordersPage(m); if(page=='bom') return bom(m); if(page=='history') return hist(m); if(page=='google') return googlePage(m); if(page=='settings') return settings(m); return dash(m);}catch(e){console.error(e); $('main').innerHTML='<h1>เกิด Error</h1><div class="box"><b>'+String(e.message||e)+'</b><p class="hint">กด Settings → Reset หรือส่งรูปหน้านี้มาให้ผมดู</p><button class="primary" onclick="localStorage.removeItem(\'bakery_erp_v6_1\');location.reload()">Reset ข้อมูลใน Browser</button></div>';}}
function head(t,h=''){return `<h1>${t}</h1><div class="hint">${h}</div>`}
function todayISO(){let d=new Date();return d.toISOString().slice(0,10)}
function dateISO(t){let m=String(t||'').match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/); if(m){let y=+m[3]; if(y>2400)y-=543; return String(y).padStart(4,'0')+'-'+String(+m[2]).padStart(2,'0')+'-'+String(+m[1]).padStart(2,'0')} let d=new Date(t); return isNaN(d)?'':d.toISOString().slice(0,10)}
function dash(m){
  let selDate=$('dashDate')?.value||todayISO();
  let fg=db.items.reduce((a,x)=>a+(+x.stock||0),0), rmv=db.rm.reduce((a,x)=>a+(+x.stock||0),0);
  let open=db.po.filter(x=>!['Completed','Cancelled'].includes(x.status)).length;
  let doneToday=db.po.filter(x=>x.status=='Completed' && dateISO(x.finish||x.time)==selDate).reduce((a,x)=>a+(+x.qty||0),0);
  let os=getOrderDay(selDate);
  let orderToday=+os.total||0;
  let orderShipped=+os.shipped||0;
  let orderPending=Math.max(0,orderToday-orderShipped);
  if(useTodayCache(selDate)){
    doneToday=dashboardValue('PROD_TODAY', doneToday);
    orderToday=dashboardValue('ORDER_TODAY', orderToday);
    orderShipped=dashboardValue('ORDER_SHIPPED_TODAY', orderShipped);
    orderPending=dashboardValue('ORDER_PENDING_TODAY', Math.max(0,orderToday-orderShipped));
  }
  let rmLow=db.rm.filter(x=>(+x.stock||0) <= (x.min??10)).sort((a,b)=>(+a.stock||0)-(+b.stock||0)).slice(0,10);
  let fgLow=db.items.filter(x=>(+x.stock||0) <= (x.min??5)).sort((a,b)=>(+a.stock||0)-(+b.stock||0)).slice(0,10);
  let pos=db.po.filter(x=>dateISO(x.finish||x.time)==selDate && x.status=='Completed');
  let bySku={}; pos.forEach(p=>bySku[p.sku]=(bySku[p.sku]||0)+(+p.qty||0));
  let prodRows=Object.entries(bySku).sort((a,b)=>b[1]-a[1]); let max=Math.max(1,...prodRows.map(x=>x[1]));
  let pending=db.po.filter(x=>!['Completed','Cancelled'].includes(x.status));
  let status=['Open','Released','In Progress','Finished'].map(st=>({st,count:pending.filter(x=>x.status==st).length}));
  let nobom=db.items.filter(x=>!(db.bom[x.sku]||[]).length).slice(0,8);
  m.innerHTML=head('Dashboard','ของใกล้หมด / ยอดผลิตรายวัน / งานค้างผลิต / Order วันนี้')+
  `<div class="toolbar row3"><input id="dashDate" type="date" value="${selDate}" onchange="dash($('main'))"><span></span><button class="ghost" onclick="dash($('main'))">Refresh</button></div>`+
  `<div class="kpis"><div class="kpi">FG Stock รวม<b>${fg}</b></div><div class="kpi">RM Stock รวม<b>${rmv}</b></div><div class="kpi">งานค้างผลิต<b>${open}</b></div><div class="kpi">ผลิตวันที่เลือก<b>${doneToday}</b></div></div>`+
  `<div class="kpis" style="margin-top:14px"><div class="kpi">Order วันนี้<b>${orderToday}</b></div><div class="kpi">ส่งสำเร็จวันนี้<b>${orderShipped}</b></div><div class="kpi">Order ค้างส่ง<b>${orderPending}</b></div><div class="kpi">Success Rate<b>${orderToday?Math.round(orderShipped/orderToday*100):0}%</b></div></div>`+
  `<div class="dashgrid"><div class="box"><h2>1) วัตถุดิบใกล้หมด</h2>${lowTable(rmLow,'RM')}</div><div class="box"><h2>สินค้าใกล้หมด</h2>${lowTable(fgLow,'FG')}</div></div>`+
  `<div class="dashgrid"><div class="box"><h2>2) ยอดผลิตวันที่ ${selDate}</h2>${prodRows.length?`<table><tr><th>SKU</th><th>จำนวน</th><th>กราฟ</th></tr>${prodRows.map(r=>`<tr><td><b>${r[0]}</b></td><td>${r[1]}</td><td><div class="barwrap"><div class="bar" style="width:${Math.max(4,r[1]/max*100)}%"></div></div></td></tr>`).join('')}</table>`:'<p class="hint">ยังไม่มียอดผลิตในวันที่เลือก</p>'}</div><div class="box"><h2>3) สถานะงานค้างผลิต</h2><div class="kpis" style="grid-template-columns:repeat(2,1fr)">${status.map(x=>`<div class="kpi">${x.st}<b>${x.count}</b></div>`).join('')}</div></div></div>`+
  `<div class="dashgrid"><div class="box"><h2>งานค้างล่าสุด</h2>${poTable(pending.slice(-8).reverse())}</div><div class="box"><h2>อื่นๆ ที่ควรเช็ค</h2><p class="hint">SKU ที่ยังไม่ได้ตั้ง BOM ${nobom.length} รายการแรก</p>${nobom.length?`<table><tr><th>SKU</th><th>ชื่อ</th><th>Product</th></tr>${nobom.map(x=>`<tr><td>${x.sku}</td><td>${x.name}</td><td>${x.product}</td></tr>`).join('')}</table>`:'<p class="hint">ตั้ง BOM ครบแล้ว</p>'}</div></div>`+

  `<div class="dashgrid"><div class="box"><h2>4) Order วันที่ ${selDate}</h2>${orderDayCard(os)}</div><div class="box"><h2>Order ที่ยังส่งไม่ครบ: อะไร / เท่าไร / ทำไม</h2>${orderShortTable(os.shortages||[])}</div></div>`+
  `<div class="box"><h2>Movement ล่าสุด</h2>${movementTable(db.mov.slice(-8).reverse())}</div>`
}
function lowTable(arr,type){if(!arr.length)return '<p class="hint">ยังไม่มีรายการใกล้หมด</p>'; return `<table><tr><th>SKU</th><th>ชื่อ</th><th>คงคลัง</th><th>Min</th></tr>${arr.map(x=>`<tr><td><b>${x.sku}</b></td><td>${x.name}</td><td><span class="pill ${(+x.stock||0)<=0?'bad':''}">${x.stock||0} ${x.unit||'pcs'}</span></td><td>${x.min??(type=='RM'?10:5)}</td></tr>`).join('')}</table>`}
function movementTable(arr){if(!arr.length)return '<p class="hint">ยังไม่มี Movement</p>'; return `<table><tr><th>เวลา</th><th>Type</th><th>SKU</th><th>Mode</th><th>Qty</th><th>Ref</th></tr>${arr.map(x=>`<tr><td>${x.time}</td><td>${x.type}</td><td>${x.sku}</td><td>${x.mode}</td><td>${x.qty}</td><td>${x.ref||''}</td></tr>`).join('')}</table>`}

  let r=(db.rm||[]).find(i=>String(i.sku)==String(sku));

const DEFAULT_PROD_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSYNme5DqGdSFscQTOcVPBDC5cSjiBQ2Ag_tYFBjgEt7PH-WqnOqMB8V7B2WllQ0IFQoE0JA-ZZkUrA/pub?gid=1949740572&single=true&output=csv';

async function fetchCsvText(url){
  const clean=String(url||'').trim();
  const targets=[
    clean,
    'https://api.allorigins.win/raw?url='+encodeURIComponent(clean),
    'https://corsproxy.io/?'+encodeURIComponent(clean)
  ];
  let lastErr=null;
  for(const u of targets){
    try{
      const res=await fetch(u,{cache:'no-store'});
      if(!res.ok) throw new Error('HTTP '+res.status);
      const text=await res.text();
      if(text && text.includes('รหัสสินค้า')) return text;
      if(text && text.toLowerCase().includes('sku')) return text;
      if(text && text.length>20) return text;
    }catch(e){ lastErr=e; }
  }
  throw lastErr || new Error('Cannot fetch CSV');
}

function parseCsvRows(text){
  const rows=[]; let row=[], cur='', q=false;
  text=String(text||'').replace(/^\ufeff/,'');
  for(let i=0;i<text.length;i++){
    const c=text[i], n=text[i+1];
    if(c==='"'){
      if(q && n==='"'){cur+='"'; i++;}
      else q=!q;
    }else if(c===',' && !q){row.push(cur); cur='';}
    else if((c==='\n' || c==='\r') && !q){
      if(c==='\r' && n==='\n') i++;
      row.push(cur); cur='';
      if(row.some(v=>String(v).trim()!=='')) rows.push(row);
      row=[];
    }else cur+=c;
  }
  row.push(cur);
  if(row.some(v=>String(v).trim()!=='')) rows.push(row);
  return rows.map(r=>r.map(v=>String(v||'').trim()));
}

function parseProductionCsv(text){
  const rows=parseCsvRows(text);
  if(rows.length<2) return [];
  const headers=rows[0].map(h=>String(h||'').trim().toLowerCase());
  const find=(keys)=>{
    for(const k of keys){
      const kk=k.toLowerCase();
      let i=headers.findIndex(h=>h===kk || h.includes(kk));
      if(i>=0) return i;
    }
    return -1;
  };
  const iTime=find(['timestamp','ประทับเวลา','เวลา']);
  const iSku=find(['รหัสสินค้า','sku','skuid']);
  const iProd=find(['หมวดหมู่สินค้า','หมวด','product','category']);
  const iQty=find(['จำนวนที่ผลิตได้','จำนวน','qty','quantity']);
  const iExp=find(['expiry date','วันหมดอายุ','หมดอายุ','expiry']);
  const iOp=find(['ชื่อผู้บันทึก','ผู้บันทึก','operator','ชื่อ']);
  const iRem=find(['หมายเหตุ','remark','note']);
  const iPhoto=find(['แนบรูปภาพสินค้า','รูป','photo','image']);
  const iMfgDate=find(['วันที่ผลิต','mfg date','production date']);
  const iMfgTime=find(['เวลาที่ผลิต','mfg time','production time']);
  if(iSku<0 || iQty<0) return [];
  const out=[];
  rows.slice(1).forEach((r,idx)=>{
    const sku=(r[iSku]||'').trim();
    const rawQty=String(r[iQty]||'').replace(/,/g,'').trim();
    const qty=Number(rawQty);
    if(!sku || !qty) return;
    const timestamp=(iTime>=0?r[iTime]:'') || (iMfgDate>=0?r[iMfgDate]:'') || now();
    out.push({
      id:'GS-'+idx+'-'+sku+'-'+rawQty+'-'+String(timestamp).replace(/\W/g,''),
      timestamp,
      sku,
      product:iProd>=0?r[iProd]:'',
      qty,
      expiry:iExp>=0?r[iExp]:'',
      operator:iOp>=0?r[iOp]:'',
      remark:iRem>=0?r[iRem]:'',
      photo:iPhoto>=0?r[iPhoto]:'',
      mfgDate:iMfgDate>=0?r[iMfgDate]:'',
      mfgTime:iMfgTime>=0?r[iMfgTime]:'',
      source:'Google Sheet CSV'
    });
  });
  return out;
}

async function syncProductionCsv(){
  const input=$('prodCsvUrl');
  const url=(input?.value || db.remote?.csvUrl || DEFAULT_PROD_CSV_URL).trim();
  if(!url) return toast('ใส่ Google Sheet CSV URL ก่อน');
  db.remote=db.remote||{};
  db.remote.csvUrl=url;
  save();
  toast('กำลัง Sync Google Sheet...');
  try{
    const text=await fetchCsvText(url);
    const rows=parseProductionCsv(text);
    if(!rows.length){
      alert('Sync ได้ แต่ไม่พบคอลัมน์ SKU/จำนวน\nเช็คว่า Sheet ที่ Publish เป็น Form Responses 1 และ Format เป็น CSV');
      return;
    }
    db.prodLog=rows;
    applyFgStockFromProdLog();
    db.remote.lastCsvSync=now();
    save();
    render();
    toast('Sync สำเร็จ '+rows.length+' รายการ / อัปเดต FG Stock แล้ว');
  }catch(e){
    console.error(e);
    alert('Sync ไม่สำเร็จ: '+(e.message||e)+'\n\nถ้าเปิดไฟล์จาก C: แล้วติด ให้ใช้วิธี Publish CSV ตามเดิม หรือลองกดอีกครั้ง ระบบมี proxy สำรองให้แล้ว');
  }
}

function productionSummaryPage(m){

function voidProductionPrompt(logId){
  if(!logId)return;

  if(reason===null)return;
  reason=String(reason||'').trim();
  if(!reason)return toast('ต้องใส่เหตุผลก่อน');
  if(!confirm('Void รายการ '+logId+' ?\nระบบจะ Reverse FG/RM Stock อัตโนมัติ'))return;
  voidProductionTransaction(logId,reason);
}
async function voidProductionTransaction(logId,reason){
  toast('กำลัง Void Transaction...');
  const markLocalVoided=()=>{
    const r=(db.prodLog||[]).find(x=>String(x.id||x.LogID||'')===String(logId));
    if(r){
      r.status='Voided'; r.Status='Voided'; r.voidReason=reason; r.VoidReason=reason; r.voidAt=now(); r.VoidAt=now();
      saveLocalOnly();
    }
  };
  const reloadAndConfirm=async()=>{
    await sleep(900);
    await loadFromGoogleSheet();
    page='trx'; render();
    const r=(db.prodLog||[]).find(x=>String(x.id||x.LogID||'')===String(logId));
    const ok=String(r?.status||r?.Status||'').toLowerCase()==='voided';
    if(ok){ sheetDone('✅ Void สำเร็จ / ERP อัปเดตแล้ว / Stock ถูก Reverse แล้ว'); return true; }
    return false;
  };
  try{
    await apiPost({action:'voidproduction',logId,reason,voidBy:'ERP User'});
    markLocalVoided();
    const ok=await reloadAndConfirm();
    if(!ok) sheetDone('ส่งคำสั่ง Void แล้ว แต่ยังโหลดข้อมูลใหม่ไม่ทัน กดโหลดข้อมูลจาก Google Sheet อีกครั้ง');
  }catch(e){
    console.warn('Void response warning:', e);
    toast('ส่งคำสั่ง Void แล้ว กำลังตรวจสอบข้อมูลล่าสุด...');
    try{
      await sleep(3500);
      const ok=await reloadAndConfirm();
      if(!ok) alert('ยังยืนยันผล Void ไม่ได้: '+(e.message||e)+'\nแต่ถ้า Google Sheet อัปเดตแล้ว ให้กดโหลดข้อมูลจาก Google Sheet อีกครั้ง');
    }catch(e2){
      console.error(e2);
      alert('Void อาจสำเร็จแล้ว แต่ ERP โหลดข้อมูลกลับไม่ได้: '+(e2.message||e2));
    }
  }
}

function parsePasteRows(text){let lines=String(text||'').trim().split(/\r?\n/).filter(Boolean); if(!lines.length)return []; let sep=lines[0].includes('\t')?'\t':','; return lines.map(line=>{let out=[], cur='', q=false; for(let i=0;i<line.length;i++){let ch=line[i]; if(ch=='"'){q=!q; continue;} if(ch==sep && !q){out.push(cur); cur='';} else cur+=ch;} out.push(cur); return out.map(x=>x.trim());});}
function importFgPaste(){let rows=parsePasteRows($('fgPaste').value); if(rows.length<2)return toast('วางข้อมูลพร้อมหัวตารางก่อน'); let h=rows[0].map(x=>x.toLowerCase()); const find=(names)=>names.map(n=>h.findIndex(x=>x.includes(n))).find(i=>i>=0); let iSku=find(['sku','รหัสสินค้า']), iQty=find(['จำนวน','qty']), iProd=find(['หมวด','product']), iExp=find(['expiry','หมดอายุ']), iOp=find(['ผู้บันทึก','operator','ชื่อ']), iRem=find(['หมายเหตุ','remark']), iTime=find(['timestamp','เวลา']); let added=0; for(let r of rows.slice(1)){let sku=r[iSku]||''; let qty=+(r[iQty]||0); if(!sku||!qty)continue; let rec={id:'FGP-'+Date.now()+'-'+added,timestamp:r[iTime]||now(),sku,product:r[iProd]||'',qty,expiry:r[iExp]||'',operator:r[iOp]||'',remark:r[iRem]||'',source:'Paste'}; db.prodLog=db.prodLog||[]; if(!db.prodLog.some(x=>x.id==rec.id||((x.timestamp||'')==rec.timestamp&&x.sku==rec.sku&&(+x.qty||0)==qty))) {db.prodLog.push(rec); added++;}}
  save(); render(); toast('Import Production Log แล้ว '+added+' รายการ')}
function prod(m){

function bulkPoTable(list){return `<table><tr><th style="width:110px"><label style="display:flex;gap:6px;align-items:center"><input type="checkbox" id="poSelectAll" onchange="toggleAllPO(this.checked)" style="width:22px;height:22px"> เลือกทั้งหมด</label></th><th>SKU</th><th>ชื่อสินค้า</th><th>คงคลัง</th><th>จำนวนผลิต</th><th>RM ที่ต้องใช้</th></tr>${list.map(x=>`<tr><td><input type="checkbox" class="poChk" data-sku="${x.sku}" onchange="togglePoQty('${x.sku}')" style="width:22px;height:22px"></td><td><b>${x.sku}</b></td><td>${x.name}</td><td>${x.stock||0}</td><td><input id="poqty_${x.sku}" class="poQty" type="number" min="0" placeholder="จำนวน" oninput="updateBulkReq('${x.sku}')"></td><td id="poreq_${x.sku}">${reqText(x.sku,0)}</td></tr>`).join('')}</table>`}

function togglePoQty(sku){let q=$('poqty_'+sku), chk=document.querySelector(`.poChk[data-sku="${sku}"]`); if(chk?.checked && !q.value) q.value=$('bulkQty')?.value||1; updateBulkReq(sku)}

async function createBulkPO(){
  let rows=[...document.querySelectorAll('.poChk:checked')].map(c=>({sku:c.dataset.sku,qty:+$('poqty_'+c.dataset.sku).value||0})).filter(x=>x.qty>0);

  let remark=$('bulkRemark')?.value||'';
  const baseSeq=+(db.seq||1);
  const created=rows.map((r,i)=>({id:'PO-'+String(baseSeq+i).padStart(5,'0'),sku:r.sku,qty:r.qty,status:'Open',time:now(),start:'',finish:'',remark}));
  toast('กำลังบันทึกสั่งผลิต '+created.length+' รายการเข้า Google Sheet...');

async function createPO(){let sku=$('psku')?.value, qty=+$('pqty')?.value; if(!sku||!qty) return toast('เลือก SKU และจำนวน'); let id='PO-'+String(db.seq).padStart(5,'0'); let p={id,sku,qty,status:'Open',time:now(),start:'',finish:'',remark:$('premark')?.value||''}; toast('กำลังบันทึก '+id+' เข้า Google Sheet...'); try{await savePODirect(p); db.seq++; db.po.push(p); saveLocalOnly(); render(); sheetDone('สร้าง '+id+' เข้า Google Sheet แล้ว');}catch(e){console.error(e); alert('สร้างงานผลิตไม่สำเร็จ: '+(e.message||e));}}
function poTable(arr){if(!arr.length)return '<p class="hint">ยังไม่มีงาน</p>'; return `<table><tr><th>เวลา</th><th>PO</th><th>SKU</th><th>จำนวน</th><th>สถานะ</th><th>RM ที่ต้องใช้</th><th></th></tr>${arr.map(p=>`<tr><td>${p.time}</td><td>${p.id}</td><td>${p.sku}</td><td>${p.qty}</td><td>${statusPill(p.status)}</td><td>${reqText(p.sku,p.qty)}</td><td class="actions">${poActions(p)}</td></tr>`).join('')}</table>`}
function statusPill(s){let c=s=='Completed'?'good':s=='Cancelled'?'bad':s=='In Progress'?'blue':''; return `<span class="pill ${c}">${s}</span>`}

function setPO(id,s){let p=db.po.find(x=>x.id==id); p.status=s; if(s=='Finished')p.finish=now(); saveLocalOnly(); render(); savePODirect(p); toast('เปลี่ยนสถานะแล้ว / ส่งเข้า Google Sheet ทันที')}
function startPO(id){let p=db.po.find(x=>x.id==id), b=db.bom[p.sku]||[]; if(!b.length&&!confirm('SKU นี้ยังไม่ได้ตั้ง BOM จะ Start โดยไม่ตัด RM?')) return; const before=(db.mov||[]).length; for(const r of b) move('RM',r.sku,'OUT',(+r.qty||0)*p.qty,p.id,'Issue to production'); p.status='In Progress'; p.start=now(); saveLocalOnly(); render(); sendNewMovementsSince(before); savePODirect(p); toast('Start แล้ว / ตัด RM แล้ว / ส่งเข้า Google Sheet')}
function completePO(id){let p=db.po.find(x=>x.id==id); const before=(db.mov||[]).length; move('FG',p.sku,'IN',+p.qty,p.id,'Production completed'); p.status='Completed'; p.finish=now(); saveLocalOnly(); render(); sendNewMovementsSince(before); savePODirect(p); toast('Completed และรับ FG เข้า Stock แล้ว / ส่งเข้า Google Sheet')}

  `<div class="box"><h2>ประวัติสรุป Order ล่าสุด</h2>${orderDayHistory()}</div>`;

function getOrderDay(date){db.orderDays=db.orderDays||[]; let os=db.orderDays.find(x=>x.date==date); if(!os){os={date,total:0,shipped:0,note:'',shortages:[]};} return os;}
function upsertOrderDay(os){db.orderDays=db.orderDays||[]; let i=db.orderDays.findIndex(x=>x.date==os.date); if(i>=0) db.orderDays[i]=os; else db.orderDays.push(os);}
function saveOrderDay(){let date=$('orderDate').value||todayISO(); let os=getOrderDay(date); os.date=date; os.total=+$('oday_total').value||0; os.shipped=Math.min(+$('oday_shipped').value||0, os.total); os.note=$('oday_note').value||''; os.shortages=os.shortages||[]; upsertOrderDay(os); saveLocalOnly(); render(); saveOrderDirect(os); toast('บันทึกสรุป Order แล้ว / ส่งเข้า Google Sheet ทันที')}
function addShortageLine(){let date=$('orderDate').value||todayISO(); let os=getOrderDay(date); os.total=+$('oday_total').value||0; os.shipped=Math.min(+$('oday_shipped').value||0, os.total); os.note=$('oday_note').value||''; let sku=$('shortSku').value, qty=+$('shortQty').value||0, reason=$('shortReason').value||''; if(!sku||qty<=0)return toast('เลือก SKU และใส่จำนวนที่ขาด'); let line={sku,qty,reason}; os.shortages=os.shortages||[]; os.shortages.push(line); upsertOrderDay(os); saveLocalOnly(); render(); saveOrderDirect(os); saveOrderItemDirect(date,line); toast('เพิ่มรายการขาดแล้ว / ส่งเข้า Google Sheet ทันที')}
function removeShortageLine(date,i){let os=getOrderDay(date); let removed=(os.shortages||[])[i]; (os.shortages||[]).splice(i,1); upsertOrderDay(os); saveLocalOnly(); render(); saveOrderDirect(os); if(removed) deleteSheet('OrderItems','OrderNo','DAY-'+date+'-'+removed.sku,'OrderItems'); toast('ลบรายการแล้ว / อัปเดต Google Sheet')}
function updateShortageReason(date,i,val){let os=getOrderDay(date); if(os.shortages&&os.shortages[i]){os.shortages[i].reason=val; upsertOrderDay(os); saveLocalOnly(); saveOrderItemDirect(date,os.shortages[i]);}}
function orderDayCard(os){return `<table><tr><th>วันที่</th><th>Order</th><th>ส่งสำเร็จ</th><th>ยังไม่สำเร็จ</th><th>หมายเหตุ</th></tr><tr><td>${os.date}</td><td><b>${+os.total||0}</b></td><td><b>${+os.shipped||0}</b></td><td><b class="${((+os.total||0)-(+os.shipped||0))>0?'danger':''}">${Math.max(0,(+os.total||0)-(+os.shipped||0))}</b></td><td>${os.note||''}</td></tr></table>`}

function orderShortEditor(arr){let date=$('orderDate')?.value||todayISO(); if(!arr||!arr.length)return '<p class="hint">ยังไม่มีรายการขาด</p>'; return `<table><tr><th>อะไร</th><th>จำนวนที่ขาด</th><th>ทำไม</th><th></th></tr>${arr.map((x,i)=>`<tr><td><b>${x.sku}</b><br><span class="mini">${itemName(x.sku)}</span></td><td>${x.qty}</td><td><input value="${esc(x.reason||'')}" onchange="updateShortageReason('${date}',${i},this.value)"></td><td><button class="small" onclick="removeShortageLine('${date}',${i})">ลบ</button></td></tr>`).join('')}</table>`}

function showAppsScript(){modal(`<h2>Google Apps Script Code</h2><p class="hint">สร้าง Apps Script ที่ผูกกับ Google Sheet แล้ววาง Code นี้ จากนั้น Deploy เป็น Web App: Execute as Me, Who has access = Anyone with the link</p><textarea style="height:420px;font-family:Consolas,monospace" readonly>${APPS_SCRIPT_CODE.replaceAll('&','&amp;').replaceAll('<','&lt;')}</textarea>`)}
const APPS_SCRIPT_CODE = `const SS = SpreadsheetApp.getActive();
function setup(){
  ['Stock_Movement','Production_Log'].forEach(name=>{ if(!SS.getSheetByName(name)) SS.insertSheet(name); });
  const sh=SS.getSheetByName('Stock_Movement');
  if(sh.getLastRow()==0) sh.appendRow(['id','time','type','sku','mode','qty','ref','remark','stock','source']);
  const po=SS.getSheetByName('Production_Log');
  if(po.getLastRow()==0) po.appendRow(['id','time','sku','qty','status','start','finish','remark']);
}
function doPost(e){
  setup();
  const data=JSON.parse(e.postData.contents||'{}');
  if(data.action==='movement') appendMovement(data.movement,'ERP');
  if(data.action==='movements') (data.movements||[]).forEach(r=>appendMovement(r,'ERP'));
  return json({ok:true});
}
function doGet(e){
  setup();
  const action=e.parameter.action||'';
  if(action==='movements') return json({ok:true,movements:readAllMovements()});
  return json({ok:true,message:'Bakery ERP Google Sheet API'});
}
function appendMovement(r,source){
  const sh=SS.getSheetByName('Stock_Movement');
  sh.appendRow([r.id||Utilities.getUuid(),r.time||new Date(),r.type||'',r.sku||'',r.mode||'',Number(r.qty||0),r.ref||'',r.remark||'',r.stock||'',source||'']);
}
function readAllMovements(){
  let rows=[];

function prodSummarySourceLabel(r){
  const s=String(r.source||r.Source||'').toLowerCase();
  if(s.includes('erp-manual') || s.includes('production record')) return 'บันทึกผลผลิต ERP';
  if(s.includes('google') || s.includes('csv') || s.includes('uploaded') || s.includes('paste') || s.includes('form')) return 'QR / Google Form';
  return 'QR / Google Form';
}
function prodSummaryItemInfo(sku, fallbackProduct='', fallbackVariant=''){
  const it=(db.items||[]).find(x=>String(x.sku)==String(sku))||{};
  return {
    name: it.name||'',
    product: it.product||fallbackProduct||'-',
    variant: it.variant||fallbackVariant||it.weight||'-'
  };
}
function productionSummaryAllRows(){
  const out=[];
  (db.po||[]).forEach(p=>{
    if(String(p.status||'').toLowerCase()!=='completed') return;
    const sku=String(p.sku||p.SKU||'');
    const info=prodSummaryItemInfo(sku);
    out.push({
      date: dateISO(p.finish||p.FinishAt||p.time||p.CreatedAt||''),
      timestamp: p.finish||p.FinishAt||p.time||p.CreatedAt||'',
      source: 'คำสั่งผลิต ERP',
      ref: p.id||p.PO||'',
      sku,
      name: info.name,
      product: info.product,
      variant: info.variant,
      qty: +p.qty||+p.Qty||0
    });
  });
  (db.prodLog||[]).forEach(r=>{
    const sku=String(r.sku||r.SKU||'');
    const info=prodSummaryItemInfo(sku, r.product||r.Product||'', r.variant||r.Variant||'');
    out.push({
      date: dateISO(r.timestamp||r.Timestamp||r.mfgDate||r.MfgDate||''),
      timestamp: r.timestamp||r.Timestamp||r.mfgDate||r.MfgDate||'',
      source: prodSummarySourceLabel(r),
      ref: r.id||r.LogID||'',
      sku,
      name: info.name,
      product: info.product,
      variant: info.variant,
      qty: +r.qty||+r.Qty||0
    });
  });
  return out.filter(x=>x.sku && x.qty>0);
}
function productionSummaryPage(m){

    const d=r.date||dateISO(r.timestamp||'');
    if(start && d && d<start) return false;
    if(end && d && d>end) return false;
    if(prodFilter && r.product!==prodFilter) return false;
    if(sourceFilter && r.source!==sourceFilter) return false;
    return true;
  });
  const map={};
  rows.forEach(r=>{
    const key=r.product+'||'+r.variant;
    if(!map[key]) map[key]={product:r.product,variant:r.variant,qty:0,po:0,qr:0,manual:0,skuCount:new Set(),rows:0};
    map[key].qty += +r.qty||0;
    if(r.source==='คำสั่งผลิต ERP') map[key].po += +r.qty||0;
    else if(r.source==='บันทึกผลผลิต ERP') map[key].manual += +r.qty||0;
    else map[key].qr += +r.qty||0;
    map[key].skuCount.add(r.sku);
    map[key].rows += 1;
  });
  const summary=Object.values(map).sort((a,b)=>b.qty-a.qty || String(a.product).localeCompare(String(b.product)));
  const totalQty=summary.reduce((a,x)=>a+x.qty,0);
  const totalPO=rows.filter(x=>x.source==='คำสั่งผลิต ERP').reduce((a,x)=>a+x.qty,0);
  const totalQR=rows.filter(x=>x.source==='QR / Google Form').reduce((a,x)=>a+x.qty,0);

  `<div class="toolbar"><div class="row3"><input id="sumStart" type="date" value="${start}" onchange="productionSummaryPage($('main'))"><input id="sumEnd" type="date" value="${end}" onchange="productionSummaryPage($('main'))"><select id="sumProd" onchange="productionSummaryPage($('main'))">${productOptions(prodFilter)}</select></div><div class="row3" style="margin-top:12px"><select id="sumSource" onchange="productionSummaryPage($('main'))"><option value="">ทุกแหล่งที่มา</option><option ${sourceFilter==='คำสั่งผลิต ERP'?'selected':''}>คำสั่งผลิต ERP</option><option ${sourceFilter==='QR / Google Form'?'selected':''}>QR / Google Form</option><option ${sourceFilter==='บันทึกผลผลิต ERP'?'selected':''}>บันทึกผลผลิต ERP</option></select><span></span><button class="ghost" onclick="productionSummaryPage($('main'))">Refresh</button></div></div>`+
  `<div class="kpis"><div class="kpi">ผลิตรวม<b>${totalQty}</b></div><div class="kpi">จากคำสั่งผลิต ERP<b>${totalPO}</b></div><div class="kpi">จาก QR Scan<b>${useTodayCache(start)&&start===end?dashboardValue('PROD_QR_TODAY',totalQR):totalQR}</b></div><div class="kpi">จากบันทึกผลผลิต ERP<b>${useTodayCache(start)&&start===end?dashboardValue('PROD_MANUAL_TODAY',totalManual):totalManual}</b></div></div>`+

function productionSummaryTable(arr,total){
  if(!arr.length)return '<p class="hint">ยังไม่มีผลผลิตในช่วงวันที่เลือก</p>';
  return `<table><tr><th>Product</th><th>Variant</th><th>จำนวนรวม</th><th>คำสั่งผลิต ERP</th><th>QR Scan</th><th>บันทึกผลผลิต ERP</th><th>%</th></tr>${arr.map(x=>`<tr><td><b>${escHTML(x.product)}</b></td><td>${escHTML(x.variant)}</td><td><b style="font-size:22px;color:var(--brand)">${x.qty}</b></td><td>${x.po||0}</td><td>${x.qr||0}</td><td>${x.manual||0}</td><td>${total?Math.round(x.qty/total*100):0}%</td></tr>`).join('')}</table>`;
}
function productionSkuSummaryTable(rows){
  const map={};
  rows.forEach(r=>{
    const key=r.sku+'||'+r.source;
    if(!map[key]) map[key]={sku:r.sku,name:r.name||'',product:r.product,variant:r.variant,source:r.source,qty:0};
    map[key].qty += +r.qty||0;
  });
  const arr=Object.values(map).sort((a,b)=>b.qty-a.qty || String(a.product).localeCompare(String(b.product)));
  if(!arr.length)return '<p class="hint">ยังไม่มีรายละเอียด SKU</p>';
  return `<table><tr><th>SKU</th><th>ชื่อสินค้า</th><th>Product</th><th>Variant</th><th>แหล่งที่มา</th><th>จำนวนผลิต</th></tr>${arr.map(x=>`<tr><td><b>${escHTML(x.sku)}</b></td><td>${escHTML(x.name)}</td><td>${escHTML(x.product)}</td><td>${escHTML(x.variant)}</td><td>${escHTML(x.source)}</td><td><b>${x.qty}</b></td></tr>`).join('')}</table>`;
}
function productionSummaryRawTable(rows){
  if(!rows.length)return '<p class="hint">ยังไม่มีรายการ</p>';
  return `<table><tr><th>เวลา</th><th>แหล่งที่มา</th><th>Ref</th><th>SKU</th><th>Product</th><th>Variant</th><th>จำนวน</th></tr>${rows.map(r=>`<tr><td>${escHTML(r.timestamp||'')}</td><td>${escHTML(r.source)}</td><td>${escHTML(r.ref||'')}</td><td><b>${escHTML(r.sku)}</b></td><td>${escHTML(r.product)}</td><td>${escHTML(r.variant)}</td><td><b>${r.qty}</b></td></tr>`).join('')}</table>`;
}

function viewerDeny(){ alert('โหมด Viewer ดูได้อย่างเดียว แก้ไข/บันทึก/ลบ/ตัด Stock ไม่ได้'); }
function applyViewerUI(){
  if(!VIEWER_ONLY) return;
  document.body.classList.add('viewer-mode');
  const sub=document.querySelector('.sub');
  if(sub) sub.innerHTML='Viewer Mode<br>ดูข้อมูลได้อย่างเดียว / แก้ไขไม่ได้';
  const main=$('main');
  if(main && !main.querySelector('.viewer-banner')){
    main.insertAdjacentHTML('afterbegin','<div class="viewer-banner">VIEWER MODE: ดูข้อมูลได้ทุกหน้า แต่ปุ่มเพิ่ม / แก้ไข / ลบ / บันทึก / รับเข้า-ออก / ตัด BOM ถูกปิด</div>');
  }
  const writeWords=['เพิ่ม','บันทึก','ลบ','แก้ไข','รับเข้า','จ่ายออก','ปรับ','ของเสีย','คืนเข้า','สร้าง','Start','Finish','Complete','Release','Cancel','ตัด RM','Cycle Count','Sync เข้า Database','บันทึกขึ้น Google Sheet','Paste from Excel','Import','Bulk','Reset','Restore','Apply'];
  document.querySelectorAll('button').forEach(btn=>{
    const txt=(btn.textContent||'').trim();
    const oc=btn.getAttribute('onclick')||'';
    const allowRead = /Refresh|โหลดข้อมูลจาก Google Sheet|Sync CSV รับเข้า FG|เปิด Auto Sync|ปิด Auto Sync|Export|Download|ทดสอบ API|ไปหน้า|Search/i.test(txt+oc);
    const isWrite = writeWords.some(w=>txt.includes(w) || oc.includes(w)) || /save|add|edit|delete|remove|stockMove|create|complete|setPO|startPO|clear|restore|pushToGoogleSheet|syncProdToSheet|commitImport|applyBulk|bulkDelete/i.test(oc);
    if(isWrite && !allowRead){
      btn.classList.add('viewer-disabled');
      btn.onclick=(e)=>{e.preventDefault(); viewerDeny(); return false;};
      btn.type='button';
    }
  });
  document.querySelectorAll('input,select,textarea').forEach(el=>{
    const id=el.id||'';
    const readAllowed=/q|prodCsvUrl|Date|dashDate|fgDate|sq|fprod|frgrp|rq|mdq|mdTarget|stype|sprod|ctype|cprod|pprod|bprod|bsku/i.test(id);
    if(!readAllowed && (el.type==='number' || el.tagName==='TEXTAREA' || /qty|remark|note|name|sku|cost|price|stock|min|reason|apiUrl|order|bulk|count|paste/i.test(id))){
      el.readOnly=true;
      el.disabled=true;
    }
  });
}

/* ===== v9.6 Production Summary Stable: รวมจาก PO + ProductionLog + StockMovement หลัง Refresh ===== */
function productionSummaryMoveSource(m){
  const src=String(m.source||m.Source||'').toLowerCase();
  const ref=String(m.ref||m.Ref||'');
  const rem=String(m.remark||m.Remark||'').toLowerCase();
  if(src.includes('produce') || src.includes('erp-manual') || rem.includes('production record')) return 'บันทึกผลผลิต ERP';
  if(src.includes('google') || src.includes('form') || src.includes('csv') || ref.includes('GS-') || ref.includes('FGP-')) return 'QR / Google Form';
  return 'บันทึกผลผลิต ERP';
}
function productionSummaryAllRows(){
  const out=[];
  const poRefs=new Set();
  const logRefs=new Set();
  (db.po||[]).forEach(p=>{
    if(String(p.status||'').toLowerCase()!=='completed') return;
    const sku=String(p.sku||p.SKU||'');
    const info=prodSummaryItemInfo(sku);
    const ref=p.id||p.PO||'';
    if(ref) poRefs.add(String(ref));
    out.push({date:dateISO(p.finish||p.FinishAt||p.time||p.CreatedAt||''),timestamp:p.finish||p.FinishAt||p.time||p.CreatedAt||'',source:'คำสั่งผลิต ERP',ref,sku,name:info.name,product:info.product,variant:info.variant,qty:+p.qty||+p.Qty||0});
  });
  (db.prodLog||[]).forEach(r=>{
    const status=String(r.status||r.Status||'Active').toLowerCase();
    if(status==='voided' || status==='cancelled') return;
    const sku=String(r.sku||r.SKU||'');
    const info=prodSummaryItemInfo(sku, r.product||r.Product||'', r.variant||r.Variant||'');
    const ref=r.id||r.LogID||'';
    if(ref) logRefs.add(String(ref));
    out.push({date:dateISO(r.timestamp||r.Timestamp||r.mfgDate||r.MfgDate||''),timestamp:r.timestamp||r.Timestamp||r.mfgDate||r.MfgDate||'',source:prodSummarySourceLabel(r),ref,sku,name:info.name,product:info.product,variant:info.variant,qty:+r.qty||+r.Qty||0});
  });
  // สำรองสำคัญ: หลัง Refresh บางแหล่งอาจเหลือใน StockMovement แต่ไม่อยู่ใน ProductionLog
  // ให้ดึง FG IN จาก StockMovement เฉพาะที่ไม่ซ้ำกับ PO / ProductionLog
  (db.mov||[]).forEach(m=>{
    const type=String(m.type||m.ItemType||'').toUpperCase();
    const mode=String(m.mode||m.Mode||'').toUpperCase();
    const ref=String(m.ref||m.Ref||'');
    const qty=+m.qty||+m.Qty||0;
    const src=String(m.source||m.Source||'').toLowerCase();
    if(type!=='FG') return;
    if(qty<=0) return;
    if(['OUT','ADJ_OUT','SCRAP','ISSUE','CYCLE_COUNT'].includes(mode)) return;
    if(ref && (poRefs.has(ref) || logRefs.has(ref))) return;
    if(ref.startsWith('VOID-') || src.includes('void')) return;
    const sku=String(m.sku||m.SKU||'');
    const info=prodSummaryItemInfo(sku);
    out.push({date:dateISO(m.time||m.Timestamp||''),timestamp:m.time||m.Timestamp||'',source:productionSummaryMoveSource(m),ref,sku,name:info.name,product:info.product,variant:info.variant,qty});
  });
  return out.filter(x=>x.sku && x.qty>0);
}
function productionSummaryPage(m){
  const today=todayISO();
  const start=$('sumStart')?.value||today;
  const end=$('sumEnd')?.value||today;
  const prodFilter=$('sumProd')?.value||'';
  const sourceFilter=$('sumSource')?.value||'';
  const rows=productionSummaryAllRows().filter(r=>{
    const d=r.date||dateISO(r.timestamp||'');
    if(start && d && d<start) return false;
    if(end && d && d>end) return false;
    if(prodFilter && r.product!==prodFilter) return false;
    if(sourceFilter && r.source!==sourceFilter) return false;
    return true;
  });
  const map={};
  rows.forEach(r=>{
    const key=r.product+'||'+r.variant;
    if(!map[key]) map[key]={product:r.product,variant:r.variant,qty:0,po:0,qr:0,manual:0,skuCount:new Set(),rows:0};
    map[key].qty += +r.qty||0;
    if(r.source==='คำสั่งผลิต ERP') map[key].po += +r.qty||0;
    else if(r.source==='บันทึกผลผลิต ERP') map[key].manual += +r.qty||0;
    else map[key].qr += +r.qty||0;
    map[key].skuCount.add(r.sku); map[key].rows += 1;
  });
  const summary=Object.values(map).sort((a,b)=>b.qty-a.qty || String(a.product).localeCompare(String(b.product)));
  const totalQty=summary.reduce((a,x)=>a+x.qty,0);
  const totalPO=rows.filter(x=>x.source==='คำสั่งผลิต ERP').reduce((a,x)=>a+x.qty,0);
  const totalQR=rows.filter(x=>x.source==='QR / Google Form').reduce((a,x)=>a+x.qty,0);
  const totalManual=rows.filter(x=>x.source==='บันทึกผลผลิต ERP').reduce((a,x)=>a+x.qty,0);
  m.innerHTML=head('สรุปผลผลิต','รวมจาก 1) คำสั่งผลิต ERP 2) QR ที่พนักงานสแกน 3) บันทึกผลผลิตจาก ERP')+
  `<div class="toolbar"><div class="row3"><input id="sumStart" type="date" value="${start}" onchange="productionSummaryPage($('main'))"><input id="sumEnd" type="date" value="${end}" onchange="productionSummaryPage($('main'))"><select id="sumProd" onchange="productionSummaryPage($('main'))">${productOptions(prodFilter)}</select></div><div class="row3" style="margin-top:12px"><select id="sumSource" onchange="productionSummaryPage($('main'))"><option value="">ทุกแหล่งที่มา</option><option ${sourceFilter==='คำสั่งผลิต ERP'?'selected':''}>คำสั่งผลิต ERP</option><option ${sourceFilter==='QR / Google Form'?'selected':''}>QR / Google Form</option><option ${sourceFilter==='บันทึกผลผลิต ERP'?'selected':''}>บันทึกผลผลิต ERP</option></select><span></span><button class="ghost" onclick="loadFromGoogleSheet()">Refresh จาก Google Sheet</button></div></div>`+
  `<div class="kpis"><div class="kpi">ผลิตรวม<b>${totalQty}</b></div><div class="kpi">จากคำสั่งผลิต ERP<b>${totalPO}</b></div><div class="kpi">จาก QR Scan<b>${useTodayCache(start)&&start===end?dashboardValue('PROD_QR_TODAY',totalQR):totalQR}</b></div><div class="kpi">จากบันทึกผลผลิต ERP<b>${useTodayCache(start)&&start===end?dashboardValue('PROD_MANUAL_TODAY',totalManual):totalManual}</b></div></div>`+
  `<div class="box"><h2>สรุปตาม Product / Variant</h2>${productionSummaryTable(summary,totalQty)}</div>`+
  `<div class="box"><h2>รายละเอียด SKU + แหล่งที่มา</h2>${productionSkuSummaryTable(rows)}</div>`+
  `<div class="box"><h2>รายการล่าสุด</h2>${productionSummaryRawTable(rows.slice().sort((a,b)=>String(b.timestamp).localeCompare(String(a.timestamp))).slice(0,80))}</div>`;
  applyViewerUI?.();
}

if(VIEWER_ONLY) installViewerGuards(); render(); setupAutoCsvSync(); setTimeout(()=>{ if(apiUrl) loadFromGoogleSheet(); },300);
